name: CI Pipeline for OrderRobot (thinh branch)

on:
  push:
    branches:
      - thinh
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Node dependencies
        run: |
          npm ci
          npm --prefix apps/kiosk-ui ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/core-backend/requirements.txt -r services/ai-backend/requirements.txt

      - name: Build UI
        run: npm run build:ui

      - name: Run Core backend tests
        run: python -m pytest services/core-backend/tests

      - name: Run AI backend tests
        run: python -m pytest services/ai-backend/tests

  build-and-push-core:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref_name == 'thinh'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/core-backend/Dockerfile
          push: true
          tags: |
            ${{ format('{0}/orderrobot-core:latest', secrets.DOCKERHUB_USERNAME) }}
            ${{ format('{0}/orderrobot-core:latest-{1}', secrets.DOCKERHUB_USERNAME, github.sha) }}

  build-and-push-ai:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref_name == 'thinh'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push ai image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/ai-backend/Dockerfile
          push: true
          tags: |
            ${{ format('{0}/orderrobot-ai:latest', secrets.DOCKERHUB_USERNAME) }}
            ${{ format('{0}/orderrobot-ai:latest-{1}', secrets.DOCKERHUB_USERNAME, github.sha) }}

  build-and-push-ui:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref_name == 'thinh'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push ui image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/kiosk-ui/Dockerfile
          push: true
          tags: |
            ${{ format('{0}/orderrobot-ui:latest', secrets.DOCKERHUB_USERNAME) }}
            ${{ format('{0}/orderrobot-ui:latest-{1}', secrets.DOCKERHUB_USERNAME, github.sha) }}
