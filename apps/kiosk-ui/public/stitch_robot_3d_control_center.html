<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Aetheris | Advanced CGI Robot</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#00647a",
              "primary-fixed": "#00d2fd",
              "background": "#f3f7fb",
              "on-background": "#2a2f32",
              "error": "#b31b25"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        :root { --menu-easing: cubic-bezier(0.4, 0, 0.2, 1); --menu-duration: 0.8s; }
        :root { --robot-scale-factor: 1; --robot-core-color: #00d2fd; --robot-core-glow: rgba(0,210,253,0.5); }

        /* Layout & Clipping Fixes */
        #stage-container { 
            height: 100vh;
            width: 100vw;
            transition: transform var(--menu-duration) var(--menu-easing);
            z-index: 10;
        }
        
        .menu-is-open #stage-container { 
            transform: translateY(-20vh) scale(0.7); 
        }

        #robot-container { 
            transform-origin: center center; 
            transform: scale(1.6); 
            scale: var(--robot-scale-factor);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20;
        }

        /* Floating Animation */
        .robot-float { animation: float 6s cubic-bezier(0.45, 0, 0.55, 1) infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Cinematic Effects */
        .shockwave { position: absolute; border: 8px solid #00d2fd; border-radius: 50%; width: 400px; height: 200px; opacity: 0; pointer-events: none; top: 75%; left: 50%; margin-left: -200px; z-index: 5; }
        .animate-shockwave { animation: shockwave-cinematic 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes shockwave-cinematic { 
            0% { transform: scale(0.1); opacity: 1; border-width: 40px; }
            100% { transform: scale(8); opacity: 0; border-width: 1px; }
        }

        /* Face States */
        .face-eye { width: 12px; height: 12px; border-radius: 50%; background: #00d2fd; box-shadow: 0 0 10px #00d2fd; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .face-mouth { width: 24px; height: 4px; background: #00d2fd; border-radius: 99px; transition: all 0.3s; opacity: 0; }
        
        .state-angry .face-eye { background: #ff4444; box-shadow: 0 0 15px #ff4444; transform: scaleY(0.4) rotate(15deg); }
        .state-happy .face-eye { transform: scale(1.2) translateY(-2px); }
        .state-happy .face-mouth { opacity: 1; height: 8px; border-radius: 0 0 12px 12px; }
        .state-sleep .face-eye { height: 2px; transform: scaleX(1.5); box-shadow: none; opacity: 0.5; }
        .state-surprised .face-eye { transform: scale(1.8); }

        /* Zero-G Orbits */
        @keyframes orbit-parts {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(40px, -60px) rotate(90deg); }
            50% { transform: translate(-40px, -100px) rotate(180deg); }
            75% { transform: translate(-80px, -40px) rotate(270deg); }
            100% { transform: translate(0,0) rotate(360deg); }
        }

        /* Screen Shake */
        @keyframes screen-shake-heavy {
            0%, 100% { transform: translate(0,0); }
            10% { transform: translate(-15px, -15px); }
            30% { transform: translate(15px, 15px); }
            50% { transform: translate(-10px, 10px); }
            70% { transform: translate(10px, -10px); }
        }
        .shake-heavy { animation: screen-shake-heavy 0.2s infinite; }

        /* Digital Smoke/Breath */
        .digital-smoke { position: absolute; bottom: 100%; width: 4px; height: 4px; background: rgba(255,255,255,0.4); border-radius: 50%; pointer-events: none; }
        @keyframes smoke-rise { 
            0% { opacity: 0.8; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-60px) scale(4); }
        }

        /* Sliding Menu */
        #sliding-menu { transform: translateY(100%); transition: transform var(--menu-duration) var(--menu-easing); }
        #sliding-menu.active { transform: translateY(0); }
        .menu-shell {
            width: 100%;
            max-width: 1100px;
            height: 100%;
            display: grid;
            grid-template-rows: auto auto auto minmax(0, 1fr) auto;
            gap: 12px;
        }
        .menu-shell-head { display: flex; align-items: center; justify-content: flex-end; gap: 12px; }
        .menu-close-btn {
            border: 1px solid rgba(148, 163, 184, 0.34);
            background: rgba(255, 255, 255, 0.86);
            color: #475569;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
        }
        .menu-status { margin: 0; font-size: 0.82rem; color: #64748b; }
        .menu-category-row {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 2px;
            scrollbar-width: thin;
        }
        .menu-cat-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            height: 36px;
            border: 1px solid rgba(148, 163, 184, 0.3);
            background: rgba(255, 255, 255, 0.94);
            color: #475569;
            border-radius: 999px;
            padding: 7px 14px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .menu-cat-chip.active {
            background: #1e293b;
            color: #f8fafc;
            border-color: transparent;
            box-shadow: 0 8px 16px rgba(30, 41, 59, 0.26);
        }
        .menu-items-grid {
            min-height: 0;
            overflow: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 12px;
            padding-right: 6px;
        }
        .menu-item-card {
            border: 1px solid rgba(148, 163, 184, 0.28);
            border-radius: 18px;
            padding: 12px;
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(241,245,249,0.98));
            display: grid;
            gap: 9px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
        }
        .menu-item-media {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 14px;
            object-fit: cover;
            background: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.24);
            transition: transform 0.5s ease;
        }
        .menu-item-card:hover .menu-item-media { transform: scale(1.03); }
        .menu-item-name { margin: 0; font-size: 1rem; font-weight: 800; color: #0f172a; line-height: 1.2; }
        .menu-item-meta { margin: 0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; font-weight: 700; }
        .menu-item-desc {
            margin: 0;
            font-size: 0.84rem;
            color: #475569;
            line-height: 1.34;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .menu-item-price { margin: 0; font-size: 1rem; font-weight: 800; color: #0057bf; }
        .menu-item-state {
            justify-self: start;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border: 1px solid transparent;
        }
        .menu-item-state.ok { background: rgba(2, 111, 239, 0.11); border-color: rgba(2, 111, 239, 0.2); color: #0f3b7a; }
        .menu-item-state.off { background: rgba(226, 232, 240, 0.82); border-color: rgba(148, 163, 184, 0.34); color: #475569; }
        .menu-item-card.animate-item {
            animation: fadeInUp 0.42s ease-out both;
        }
        .menu-item-card.animate-item:nth-child(2n) { animation-delay: 0.04s; }
        .menu-item-card.animate-item:nth-child(3n) { animation-delay: 0.08s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mini camera (top-right) */
        .camera-mini-panel {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 56;
            width: 320px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.34);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.16);
            overflow: hidden;
        }
        .camera-mini-panel.hidden-by-admin { display: none; }
        .camera-mini-video-wrap {
            padding: 8px;
            background: rgba(255,255,255,0.72);
        }
        .camera-mini-video {
            display: block;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            object-fit: cover;
            background: #0f172a;
            border: none;
        }
        .voice-mini-panel {
            position: fixed;
            top: 226px;
            right: 16px;
            z-index: 56;
            width: 320px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.34);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.16);
            backdrop-filter: blur(8px);
            padding: 10px;
            display: grid;
            gap: 8px;
            background: linear-gradient(180deg, rgba(248,250,252,0.88), rgba(241,245,249,0.88));
        }
        .voice-mini-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .voice-mini-title {
            margin: 0;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #0f172a;
        }
        .voice-mini-toggle {
            border: 1px solid rgba(148, 163, 184, 0.34);
            background: white;
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 0.66rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #334155;
            cursor: pointer;
        }
        .voice-mini-toggle.active {
            background: #0f766e;
            border-color: transparent;
            color: #ecfeff;
        }
        .voice-mini-status {
            margin: 0;
            font-size: 0.73rem;
            color: #475569;
            line-height: 1.35;
            min-height: 1.8em;
        }
        .voice-mini-panel.content-only .voice-mini-head,
        .voice-mini-panel.content-only .voice-mini-status {
            display: none;
        }
        .voice-mini-panel.content-only {
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            padding: 0;
        }
        .voice-mini-panel.content-only .chat-mini-list {
            gap: 8px;
            max-height: 184px;
            padding: 0 2px 0 0;
        }
        .chat-mini-list {
            display: grid;
            gap: 6px;
            max-height: 150px;
            overflow: auto;
            padding-right: 2px;
        }
        .chat-mini-empty {
            margin: 0;
            font-size: 0.74rem;
            color: #64748b;
        }
        .chat-mini-item {
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(255,255,255,0.9);
            padding: 8px 10px;
            display: grid;
            gap: 4px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }
        .chat-mini-role {
            font-size: 0.62rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #64748b;
        }
        .chat-mini-text {
            margin: 0;
            font-size: 0.75rem;
            color: #0f172a;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .chat-mini-item.user {
            border-color: rgba(56, 189, 248, 0.22);
            background: rgba(236, 254, 255, 0.9);
        }
        .chat-mini-item.assistant {
            border-color: rgba(129, 140, 248, 0.18);
            background: rgba(239, 246, 255, 0.86);
        }

        .cart-mini-panel {
            position: fixed;
            left: 16px;
            bottom: 96px;
            z-index: 55;
            width: 280px;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.28);
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 24px rgba(15,23,42,0.12);
            padding: 10px;
            display: grid;
            gap: 8px;
        }
        .cart-mini-title {
            margin: 0;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #0f172a;
        }
        .cart-mini-list {
            display: grid;
            gap: 6px;
            max-height: 140px;
            overflow: auto;
        }
        .cart-mini-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 6px;
            align-items: center;
            font-size: 0.74rem;
            color: #334155;
            border-radius: 9px;
            padding: 6px;
            background: rgba(241, 245, 249, 0.9);
        }
        .cart-mini-item strong {
            color: #0f172a;
            font-weight: 700;
        }
        .cart-mini-total {
            margin: 0;
            font-size: 0.8rem;
            font-weight: 800;
            color: #0f766e;
            text-align: right;
        }
        .cart-mini-empty {
            margin: 0;
            font-size: 0.74rem;
            color: #64748b;
        }

        /* Disco Dance Mode */
        #disco-ball {
            opacity: 0;
            transform: translate(-50%, -180px);
            transition: opacity 0.25s ease;
        }
        #disco-ball.active {
            opacity: 1;
            animation: disco-drop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        #disco-ball.retract {
            opacity: 0;
            animation: disco-retract 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        #disco-ball .disco-sphere {
            transition: transform 0.3s ease, filter 0.3s ease;
        }
        body.disco-on #disco-ball .disco-sphere {
            animation: disco-spin 1.2s linear infinite;
            filter: saturate(1.6) brightness(1.08);
        }

        #rainbow-strobe {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            z-index: 40;
            mix-blend-mode: screen;
            background:
                radial-gradient(circle at 25% 15%, rgba(255, 53, 107, 0.45), transparent 35%),
                radial-gradient(circle at 75% 18%, rgba(78, 233, 255, 0.45), transparent 35%),
                radial-gradient(circle at 50% 95%, rgba(79, 255, 114, 0.4), transparent 32%),
                linear-gradient(120deg,
                    rgba(255,0,91,0.18),
                    rgba(255,142,0,0.18),
                    rgba(255,237,0,0.18),
                    rgba(0,255,153,0.18),
                    rgba(0,179,255,0.18),
                    rgba(76,0,255,0.18),
                    rgba(255,0,240,0.18));
            transition: opacity 0.25s ease;
        }
        body.disco-on #rainbow-strobe {
            opacity: 1;
            animation: rainbow-flicker 0.26s steps(2, end) infinite, rainbow-hue 2.4s linear infinite;
        }

        @keyframes disco-drop {
            0% { transform: translate(-50%, -180px); }
            75% { transform: translate(-50%, 26px); }
            100% { transform: translate(-50%, 0); }
        }
        @keyframes disco-retract {
            0% { transform: translate(-50%, 0); }
            100% { transform: translate(-50%, -180px); }
        }
        @keyframes disco-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes rainbow-flicker {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 0.85; }
        }
        @keyframes rainbow-hue {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
    </style>
</head>
<body class="bg-background font-body text-on-background min-h-screen overflow-hidden flex items-center justify-center" id="main-viewport">
<div id="rainbow-strobe"></div>
<section class="camera-mini-panel" id="camera-mini-panel" aria-label="Mini camera preview">
<div class="camera-mini-video-wrap">
<video class="camera-mini-video" id="camera-mini-video" autoplay muted playsinline></video>
</div>
</section>
<section class="voice-mini-panel content-only" id="voice-mini-panel" aria-label="Voice va chat panel">
<div class="voice-mini-head">
<p class="voice-mini-title">Hoi thoai voice</p>
<button class="voice-mini-toggle" id="voice-mini-toggle" type="button">Bat nghe</button>
</div>
<p class="voice-mini-status" id="voice-mini-status">Dang san sang STT/TTS...</p>
<div class="chat-mini-list" id="chat-mini-list">
<p class="chat-mini-empty">Chua co hoi thoai.</p>
</div>
</section>
<section class="cart-mini-panel" id="cart-mini-panel" aria-label="Gio hang mini">
<p class="cart-mini-title">Gio hang hien tai</p>
<div class="cart-mini-list" id="cart-mini-list">
<p class="cart-mini-empty">Chua co mon nao trong gio.</p>
</div>
<p class="cart-mini-total" id="cart-mini-total">Tong: 0 d</p>
</section>
<!-- Top Layers -->
<div class="fixed top-0 left-1/2 z-[60] pointer-events-none -translate-x-1/2" id="disco-ball">
<div class="w-0.5 h-32 bg-slate-300 mx-auto"></div>
<div class="disco-sphere w-24 h-24 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 shadow-2xl overflow-hidden relative">
<div class="absolute inset-0 bg-gradient-to-br from-white/40 to-transparent"></div>
</div>
</div>
<!-- Sidebar Nav -->
<aside class="fixed left-8 top-8 z-50 flex flex-col gap-5">
<button class="w-12 h-12 rounded-full bg-white/80 backdrop-blur-md border border-slate-200 flex items-center justify-center text-slate-500 hover:text-primary hover:scale-110 transition-all shadow-lg active:scale-95 group" onclick="triggerCinematic('heroLanding')">
<span class="material-symbols-outlined text-xl">rocket_launch</span>
</button>
<button class="w-12 h-12 rounded-full bg-white/80 backdrop-blur-md border border-slate-200 flex items-center justify-center text-slate-500 hover:text-primary hover:scale-110 transition-all shadow-lg active:scale-95 group" onclick="triggerCinematic('dance')">
<span class="material-symbols-outlined text-xl">music_note</span>
</button>
<button class="w-12 h-12 rounded-full bg-white/80 backdrop-blur-md border border-slate-200 flex items-center justify-center text-slate-500 hover:text-primary hover:scale-110 transition-all shadow-lg active:scale-95 group" onclick="triggerCinematic('plasmaSurge')">
<span class="material-symbols-outlined text-xl">bolt</span>
</button>
<button class="w-12 h-12 rounded-full bg-white/80 backdrop-blur-md border border-slate-200 flex items-center justify-center text-slate-500 hover:text-primary hover:scale-110 transition-all shadow-lg active:scale-95 group" onclick="triggerCinematic('zeroG')">
<span class="material-symbols-outlined text-xl">auto_awesome</span>
</button>
<button class="w-12 h-12 rounded-full bg-white/80 backdrop-blur-md border border-slate-200 flex items-center justify-center text-slate-500 hover:text-error hover:scale-110 transition-all shadow-lg active:scale-95" onclick="resetRobot()">
<span class="material-symbols-outlined text-xl">restart_alt</span>
</button>
</aside>
<!-- Stage -->
<main class="w-full h-full flex flex-col items-center justify-center relative" id="stage-container">
<div id="shockwave-holder"></div>
<div class="absolute bottom-10 w-48 h-12 bg-on-background/5 rounded-[100%] blur-3xl scale-x-150 transition-opacity duration-700" id="robot-shadow"></div>
<!-- Robot Group -->
<div class="relative w-56 h-72 flex flex-col items-center" id="robot-container">
<div class="robot-float flex flex-col items-center w-full h-full">
<!-- Head -->
<div class="robot-head w-36 h-28 bg-white rounded-[2.5rem] shadow-xl relative border-t border-slate-100 flex flex-col items-center justify-center z-30 transition-transform duration-500" id="head">
<div class="w-24 h-10 bg-slate-900 rounded-full flex flex-col items-center justify-center gap-1 overflow-hidden transition-all duration-300" id="face-screen">
<div class="flex justify-around w-full px-4">
<div class="face-eye"></div>
<div class="face-eye"></div>
</div>
<div class="face-mouth"></div>
</div>
<div class="absolute bottom-2 left-1/2 -translate-x-1/2" id="breath-source"></div>
</div>
<!-- Neck -->
<div class="w-8 h-3 bg-slate-100 -mt-1 rounded-full z-10" id="neck"></div>
<!-- Body -->
<div class="w-40 h-44 bg-white rounded-3xl shadow-xl border-t border-slate-100 relative -mt-1 z-20 transition-all duration-500" id="body">
<div class="absolute top-8 left-1/2 -translate-x-1/2 w-14 h-14 rounded-full bg-slate-50 border border-slate-100 shadow-inner flex items-center justify-center">
<div class="w-6 h-6 rounded-full transition-all duration-500" style="background: var(--robot-core-color); box-shadow: 0 0 15px var(--robot-core-glow);" id="core"></div>
</div>
</div>
<!-- Arms -->
<div class="absolute -left-8 top-32 w-8 h-24 bg-white rounded-full shadow-lg border-l border-slate-50 origin-top -rotate-6 transition-all duration-500" id="left-arm"></div>
<div class="absolute -right-8 top-32 w-8 h-24 bg-white rounded-full shadow-lg border-r border-slate-50 origin-top rotate-6 transition-all duration-500" id="right-arm"></div>
</div>
</div>
</main>
<!-- Bottom Interface -->
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100]" id="menu-toggle-dock">

<div class="menu-shell">
<div class="menu-shell-head">
<button class="menu-close-btn" onclick="toggleMenu()">Close</button>

</div>

    const head = document.getElementById('head');
    const body = document.getElementById('body');
    const neck = document.getElementById('neck');
    const leftArm = document.getElementById('left-arm');
    const rightArm = document.getElementById('right-arm');
    const core = document.getElementById('core');

    const menu = document.getElementById('sliding-menu');
    const menuToggleDock = document.getElementById('menu-toggle-dock');
    const menuLabel = document.getElementById('menu-label');

    const menuItemsGrid = document.getElementById('menu-items-grid');
    const menuStatus = document.getElementById('menu-status');
    const menuCategoryRow = document.getElementById('menu-category-row');
    const cameraMiniPanel = document.getElementById('camera-mini-panel');
    const cameraMiniVideo = document.getElementById('camera-mini-video');
    const voiceMiniToggle = document.getElementById('voice-mini-toggle');
    const voiceMiniStatus = document.getElementById('voice-mini-status');
    const chatMiniList = document.getElementById('chat-mini-list');
    const cartMiniList = document.getElementById('cart-mini-list');
    const cartMiniTotal = document.getElementById('cart-mini-total');
    const ROBOT_SCALE_STORAGE_KEY = 'admin.robot.scalePercent';
    const CAMERA_PREVIEW_VISIBLE_STORAGE_KEY = 'admin.camera.previewVisible';
    const ADMIN_ENV_STORAGE_KEY = 'admin.env.fields';
    const AUTO_GREETING_COOLDOWN_MS = 25000;
    const PRESENCE_CHECK_INTERVAL_MS = 700;
    const PRESENCE_MOTION_THRESHOLD = 16;
    const PRESENCE_ABSENCE_FRAMES = 4;

    let isMenuOpen = false;
    let menuLoaded = false;
    let activeMenuCategory = 'all';
    let currentMenuItems = [];
    let lastAutoGreetingAt = 0;
    let autoGreetingInFlight = false;
    let presenceDetectionTimer = null;
    let presenceDetected = false;
    let absenceFrames = 0;
    let previousFrameLuma = null;
    let activeGreetingAudio = null;
    let miniCameraStream = null;
    let currentSessionId = null;
    let voiceListening = false;
    let voiceRecognition = null;
    let voiceQueueRunning = false;
    const pendingUserTurns = [];
    const chatHistory = [];
    let cartState = [];
    const MENU_IMAGE_BY_ID = {
        'ts-tranchau': 'https://images.unsplash.com/photo-1558857563-b371033873b8?auto=format&fit=crop&w=1000&q=80',
        'ts-oolong': 'https://images.unsplash.com/photo-1525385133512-2f3bdd039054?auto=format&fit=crop&w=1000&q=80',
        'tra-dao': 'https://images.unsplash.com/photo-1499638673689-79a0b5115d87?auto=format&fit=crop&w=1000&q=80',
        'matcha-latte': 'https://images.unsplash.com/photo-1515823662972-da6a2e4d3002?auto=format&fit=crop&w=1000&q=80',
        'ca-phe-muoi': 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1000&q=80',
        'banh-flan': 'https://images.unsplash.com/photo-1488477181946-6428a0291777?auto=format&fit=crop&w=1000&q=80',
        'tra-vai': 'https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81?auto=format&fit=crop&w=1000&q=80',
        'socola-da-xay': 'https://images.unsplash.com/photo-1572490122747-3968b75cc699?auto=format&fit=crop&w=1000&q=80',
        'ts-khoai-mon': 'https://images.unsplash.com/photo-1621263764928-df1444c5e859?auto=format&fit=crop&w=1000&q=80',
        'ts-dua-luoi': 'https://images.unsplash.com/photo-1553530979-fbb9e4aee36f?auto=format&fit=crop&w=1000&q=80',
        'bac-xiu': 'https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=1000&q=80',
        'americano-cam': 'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=1000&q=80',
        'cappuccino': 'https://images.unsplash.com/photo-1534778101976-62847782c213?auto=format&fit=crop&w=1000&q=80',
        'latte-hat-de': 'https://images.unsplash.com/photo-1517701604599-bb29b565090c?auto=format&fit=crop&w=1000&q=80',
        'chanh-day-da-xay': 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&w=1000&q=80',
        'cookies-cream-da-xay': 'https://images.unsplash.com/photo-1577805947697-89e18249d767?auto=format&fit=crop&w=1000&q=80',
        'tra-xoai-nhiet-doi': 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?auto=format&fit=crop&w=1000&q=80',
        'tiramisu': 'https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?auto=format&fit=crop&w=1000&q=80',
    };

    const robotController = window.OrderRobot.createRobotController({
        robot,
        head,
        body,
        neck,
        leftArm,
        rightArm,
        core,
        face,
        viewport,
        discoBall,
        getIsMenuOpen: () => isMenuOpen,
        onRequestCloseMenu: () => {
            if (isMenuOpen) toggleMenu();
        },
    });
    window.printRobotInfo = () => robotController.printInfo();
    const robotArchitectureInfo = robotController.printInfo();

    function applyRobotScalePercent(scalePercent) {
        robotController.applyScalePercent(scalePercent);
    }

    function applyCameraPreviewVisible(visible) {
        if (!cameraMiniPanel) return;
        const isVisible = Boolean(visible);
        cameraMiniPanel.classList.toggle('hidden-by-admin', !isVisible);
    }

    function loadCameraPreviewVisible() {
        const raw = localStorage.getItem(CAMERA_PREVIEW_VISIBLE_STORAGE_KEY);
        applyCameraPreviewVisible(raw !== 'false');
    }

    function updateMenuPanelHeight(visibleCount) {
        if (!menu || !menuItemsGrid) return;
        const safeCount = Math.max(0, Number(visibleCount) || 0);
        const gap = 12;
        const minCardWidth = 210;
        const usableWidth = Math.max(menuItemsGrid.clientWidth, minCardWidth);
        const columns = Math.max(1, Math.floor(usableWidth / minCardWidth));
        const rows = Math.max(1, Math.ceil(safeCount / columns));
        const rowsClamped = Math.min(3, rows);
        const rowsHeight = rowsClamped * 248 + Math.max(0, rowsClamped - 1) * gap;
        const chromeHeight = 258;
        const minHeight = Math.round(window.innerHeight * 0.48);
        const maxHeight = Math.round(window.innerHeight * 0.88);
        const target = chromeHeight + rowsHeight;
        const finalHeight = Math.max(minHeight, Math.min(maxHeight, target));
        menu.style.height = `${finalHeight}px`;
        menuItemsGrid.style.overflowY = 'auto';
    }

    function loadRobotScalePercent() {
        robotController.loadScalePercent(ROBOT_SCALE_STORAGE_KEY);
    }

    function getAiApiUrl() {
        const fallback = 'http://127.0.0.1:8012';
        try {
            const raw = localStorage.getItem(ADMIN_ENV_STORAGE_KEY);
            if (!raw) return fallback;
            const parsed = JSON.parse(raw);
            const configured = String(parsed.VITE_AI_API_URL || '').trim();
            if (!configured) return fallback;
            return configured
                .replace('://127.0.0.1:8002', '://127.0.0.1:8012')
                .replace('://localhost:8002', '://localhost:8012')
                .replace(/\/$/, '');
        } catch {
            return fallback;
        }
    }

    function toggleMenu() {
        isMenuOpen = !isMenuOpen;
        if (isMenuOpen) {
            menu.classList.add('active');
            document.body.classList.add('menu-is-open');
            menuLabel.innerText = 'Close';
            if (menuToggleDock) menuToggleDock.style.display = 'none';
            setFaceState('happy');
            void ensureMenuLoaded();
        } else {
            menu.classList.remove('active');
            document.body.classList.remove('menu-is-open');
            menuLabel.innerText = 'Menu';
            if (menuToggleDock) menuToggleDock.style.display = '';
            setFaceState('normal');
        }
    }

    function setFaceState(state) {
        robotController.setFaceState(state);
    }

    function setVoiceStatus(text) {
        if (!voiceMiniStatus) return;
        voiceMiniStatus.textContent = String(text || '').trim();
    }

    function toSafeInlineText(value) {
        return toSafeText(value).replaceAll('\n', ' ');
    }

    function renderChatMini() {
        if (!chatMiniList) return;
        const latest = chatHistory.slice(-3);
        if (latest.length === 0) {
            chatMiniList.innerHTML = '<p class="chat-mini-empty">Chua co hoi thoai.</p>';
            return;
        }
        chatMiniList.innerHTML = latest.map((entry) => `
            <article class="chat-mini-item ${entry.role}">
                <span class="chat-mini-role">${entry.role === 'user' ? 'Khach' : 'Robot'}</span>
                <p class="chat-mini-text">${toSafeInlineText(entry.text)}</p>
            </article>
        `).join('');
    }

    function appendChat(role, text) {
        const cleanText = String(text || '').trim();
        if (!cleanText) return;
        chatHistory.push({ role, text: cleanText, at: Date.now() });
        if (chatHistory.length > 20) {
            chatHistory.splice(0, chatHistory.length - 20);
        }
        renderChatMini();
    }

    function updateMiniCart(cart) {
        cartState = Array.isArray(cart) ? cart : [];
        if (!cartMiniList || !cartMiniTotal) return;

        if (cartState.length === 0) {
            cartMiniList.innerHTML = '<p class="cart-mini-empty">Chua co mon nao trong gio.</p>';
            cartMiniTotal.textContent = 'Tong: 0 d';
            return;
        }

        let total = 0;
        cartMiniList.innerHTML = cartState.map((item) => {
            const quantity = Number(item.quantity || 0);
            const lineTotal = Number(item.line_total || 0);
            total += lineTotal;
            return `
                <article class="cart-mini-item">
                    <span>x${quantity}</span>
                    <strong>${toSafeInlineText(item.name || 'Mon')}</strong>
                    <span>${formatCurrencyVnd(lineTotal)}</span>
                </article>
            `;
        }).join('');
        cartMiniTotal.textContent = `Tong: ${formatCurrencyVnd(total)}`;
    }

    async function startConversationSession(source = 'camera') {
        const response = await fetch(`${getAiApiUrl()}/sessions/start`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ source }),
        });
        if (!response.ok) {
            throw new Error(`start session failed: HTTP ${response.status}`);
        }
        const payload = await response.json();
        currentSessionId = payload?.session_id || currentSessionId;
        updateMiniCart(payload?.cart);
        return payload;
    }

    async function sendConversationTurn(sessionId, transcript) {
        const response = await fetch(`${getAiApiUrl()}/sessions/${encodeURIComponent(sessionId)}/turn`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ transcript }),
        });
        if (!response.ok) {
            throw new Error(`turn failed: HTTP ${response.status}`);
        }
        return response.json();
    }

    async function playBotSpeech(text) {
        const safeText = String(text || '').trim();
        if (!safeText) return;

        const response = await fetch(`${getAiApiUrl()}/speech/synthesize`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: safeText }),
        });
        if (!response.ok) {
            throw new Error(`synthesize failed: HTTP ${response.status}`);
        }

        const blob = await response.blob();
        const audioUrl = URL.createObjectURL(blob);
        try {
            if (activeGreetingAudio) {
                activeGreetingAudio.pause();
                activeGreetingAudio = null;
            }
            const audio = new Audio(audioUrl);
            activeGreetingAudio = audio;
            audio.preload = 'auto';
            setFaceState('happy');
            try {
                await audio.play();
            } catch {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(safeText);
                    utterance.lang = 'vi-VN';
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(utterance);
                    await new Promise((resolve) => {
                        utterance.onend = () => resolve();
                        utterance.onerror = () => resolve();
                    });
                }
                return;
            }
            await new Promise((resolve) => {
                audio.onended = () => resolve();
                audio.onerror = () => resolve();
            });
        } finally {
            URL.revokeObjectURL(audioUrl);
            activeGreetingAudio = null;
            if (!isMenuOpen && !robotController.isCinematicRunning) {
                setFaceState('normal');
            }
        }
    }

    function enqueueUserTurn(transcript) {
        const cleanText = String(transcript || '').trim();
        if (!cleanText) return;
        pendingUserTurns.push(cleanText);
        if (!voiceQueueRunning) {
            void processVoiceQueue();
        }
    }

    function shouldOpenMenuFromText(text) {
        const normalized = String(text || '').toLowerCase();
        return /(xem|mo|mở).*(menu|thuc don|thực đơn)|menu/i.test(normalized);
    }

    function shouldCloseMenuFromText(text) {
        const normalized = String(text || '').toLowerCase();
        return /(dong|đóng|an|ẩn).*(menu|thuc don|thực đơn)|tat menu|tắt menu/i.test(normalized);
    }

    async function processVoiceQueue() {
        if (voiceQueueRunning) return;
        voiceQueueRunning = true;
        while (pendingUserTurns.length > 0) {
            const userText = pendingUserTurns.shift();
            if (!userText) continue;
            appendChat('user', userText);
            setVoiceStatus('Dang gui len backend...');
            if (shouldOpenMenuFromText(userText) && !isMenuOpen) {
                toggleMenu();
            }
            if (shouldCloseMenuFromText(userText) && isMenuOpen) {
                toggleMenu();
            }

            try {
                if (!currentSessionId) {
                    const sessionPayload = await startConversationSession('manual');
                    const opening = String(sessionPayload?.reply_text || '').trim();
                    if (opening) {
                        appendChat('assistant', opening);
                        await playBotSpeech(opening);
                    }
                }

                if (!currentSessionId) {
                    throw new Error('Khong tao duoc session.');
                }

                const replyPayload = await sendConversationTurn(currentSessionId, userText);
                const replyText = String(replyPayload?.reply_text || '').trim();
                updateMiniCart(replyPayload?.cart);
                if (replyPayload?.order_created) {
                    currentSessionId = null;
                    setVoiceStatus(`Da chot don ${replyPayload.order_id || ''}`.trim());
                }
                if (replyText) {
                    appendChat('assistant', replyText);
                    setVoiceStatus('Robot dang tra loi...');
                    await playBotSpeech(replyText);
                    if (shouldOpenMenuFromText(replyText) && !isMenuOpen) {
                        toggleMenu();
                    }
                    if (shouldCloseMenuFromText(replyText) && isMenuOpen) {
                        toggleMenu();
                    }
                }
                setVoiceStatus(voiceListening ? 'Dang nghe ban noi...' : 'Da tra loi xong.');
            } catch (error) {
                console.warn('[voice-turn] failed:', error);
                setVoiceStatus('Gap loi khi xu ly hoi thoai.');
            }
        }
        voiceQueueRunning = false;
    }

    function setupSpeechRecognition() {
        const RecognitionClass = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!RecognitionClass) {
            setVoiceStatus('Trinh duyet nay khong ho tro STT.');
            if (voiceMiniToggle) {
                voiceMiniToggle.disabled = true;
            }
            return;
        }

        voiceRecognition = new RecognitionClass();
        voiceRecognition.lang = 'vi-VN';
        voiceRecognition.continuous = true;
        voiceRecognition.interimResults = true;
        voiceRecognition.maxAlternatives = 1;

        voiceRecognition.onresult = (event) => {
            let interim = '';
            const finals = [];
            for (let index = event.resultIndex; index < event.results.length; index += 1) {
                const result = event.results[index];
                const text = String(result[0]?.transcript || '').trim();
                if (!text) continue;
                if (result.isFinal) {
                    finals.push(text);
                } else {
                    interim += `${text} `;
                }
            }

            if (interim.trim()) {
                setVoiceStatus(`Dang nghe: ${interim.trim()}`);
                if (activeGreetingAudio) {
                    activeGreetingAudio.pause();
                    activeGreetingAudio = null;
                }
            }
            finals.forEach((text) => enqueueUserTurn(text));
        };

        voiceRecognition.onerror = () => {
            setVoiceStatus('STT gap loi, dang thu ket noi lai...');
        };

        voiceRecognition.onend = () => {
            if (!voiceListening) return;
            window.setTimeout(() => {
                if (!voiceListening || !voiceRecognition) return;
                try {
                    voiceRecognition.start();
                } catch {}
            }, 200);
        };
    }

    function setVoiceListening(enabled) {
        if (!voiceRecognition && enabled) {
            setupSpeechRecognition();
        }
        if (!voiceRecognition) return;

        voiceListening = Boolean(enabled);
        if (voiceMiniToggle) {
            voiceMiniToggle.classList.toggle('active', voiceListening);
            voiceMiniToggle.textContent = voiceListening ? 'Dung nghe' : 'Bat nghe';
        }

        try {
            if (voiceListening) {
                voiceRecognition.start();
                setVoiceStatus('Dang nghe ban noi...');
            } else {
                voiceRecognition.stop();
                setVoiceStatus('Da dung nghe.');
            }
        } catch (error) {
            console.warn('[stt] toggle failed:', error);
            setVoiceStatus('Khong bat duoc STT, hay thu lai.');
        }
    }

    async function runAutoGreeting() {
        if (autoGreetingInFlight) return;
        const now = Date.now();
        if (now - lastAutoGreetingAt < AUTO_GREETING_COOLDOWN_MS) return;
        lastAutoGreetingAt = now;
        autoGreetingInFlight = true;
        try {
            const payload = await startConversationSession('camera');
            const greetingText = String(payload?.reply_text || '').trim();
            if (greetingText) {
                appendChat('assistant', greetingText);
                setVoiceStatus('Robot dang chao khach...');
                await playBotSpeech(greetingText);
                setVoiceStatus(voiceListening ? 'Dang nghe ban noi...' : 'San sang giao tiep.');
            }
        } catch (error) {
            console.warn('[auto-greeting] failed:', error);
            setVoiceStatus('Khong tao duoc loi chao tu dong.');
        } finally {
            autoGreetingInFlight = false;
        }
    }

    function sampleMotionScore(video) {
        if (!video || video.readyState < 2 || !video.videoWidth || !video.videoHeight) {
            return 0;
        }

        const sampleWidth = 96;
        const sampleHeight = 54;
        const canvas = sampleMotionScore.canvas || document.createElement('canvas');
        const ctx = sampleMotionScore.ctx || canvas.getContext('2d', { willReadFrequently: true });
        sampleMotionScore.canvas = canvas;
        sampleMotionScore.ctx = ctx;
        if (!ctx) return 0;

        canvas.width = sampleWidth;
        canvas.height = sampleHeight;
        ctx.drawImage(video, 0, 0, sampleWidth, sampleHeight);
        const imageData = ctx.getImageData(0, 0, sampleWidth, sampleHeight).data;

        const step = 4;
        const lumaNow = new Float32Array((sampleWidth / step) * (sampleHeight / step));
        let ptr = 0;
        for (let y = 0; y < sampleHeight; y += step) {
            for (let x = 0; x < sampleWidth; x += step) {
                const offset = (y * sampleWidth + x) * 4;
                const r = imageData[offset];
                const g = imageData[offset + 1];
                const b = imageData[offset + 2];
                lumaNow[ptr++] = 0.299 * r + 0.587 * g + 0.114 * b;
            }
        }

        if (!previousFrameLuma || previousFrameLuma.length !== lumaNow.length) {
            previousFrameLuma = lumaNow;
            return 0;
        }

        let diffSum = 0;
        for (let index = 0; index < lumaNow.length; index += 1) {
            diffSum += Math.abs(lumaNow[index] - previousFrameLuma[index]);
        }
        previousFrameLuma = lumaNow;
        return diffSum / lumaNow.length;
    }
    sampleMotionScore.canvas = null;
    sampleMotionScore.ctx = null;

    function startPresenceGreetingDetection() {
        if (!cameraMiniVideo || presenceDetectionTimer) return;
        presenceDetectionTimer = window.setInterval(() => {
            const motionScore = sampleMotionScore(cameraMiniVideo);
            if (motionScore >= PRESENCE_MOTION_THRESHOLD) {
                absenceFrames = 0;
                if (!presenceDetected) {
                    presenceDetected = true;
                    setVoiceStatus('Da thay khach, robot bat dau chao va nghe.');
                    void runAutoGreeting();
                    setVoiceListening(true);
                }
                return;
            }

            absenceFrames += 1;
            if (absenceFrames >= PRESENCE_ABSENCE_FRAMES) {
                if (presenceDetected) {
                    setVoiceStatus('Dang cho khach vao vung camera...');
                    setVoiceListening(false);
                }
                presenceDetected = false;
            }
        }, PRESENCE_CHECK_INTERVAL_MS);
    }

    async function triggerCinematic(type) {
        await robotController.triggerCinematic(type);
    }

    function resetRobot() {
        robotController.reset();
    }
    function formatCurrencyVnd(value) {
        const numeric = Number(value || 0);
        return `${new Intl.NumberFormat('vi-VN').format(Math.round(numeric))} d`;
    }

    function toSafeText(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function normalizeCategory(item) {
        return item.category || item.group || item.type || item.kind || 'Khac';
    }

    function buildPlaceholderImage(name, category) {
        const label = `${category || 'Menu'} • ${name || 'Mon'}`;
        const svg = `
            <svg xmlns='http://www.w3.org/2000/svg' width='640' height='480'>
                <defs>
                    <linearGradient id='g' x1='0' x2='1' y1='0' y2='1'>
                        <stop offset='0%' stop-color='#0f766e'/>
                        <stop offset='100%' stop-color='#155e75'/>
                    </linearGradient>
                </defs>
                <rect width='100%' height='100%' fill='url(#g)'/>
                <circle cx='500' cy='100' r='120' fill='rgba(255,255,255,0.18)'/>
                <text x='36' y='405' fill='white' font-size='30' font-family='Arial, sans-serif' opacity='0.92'>${toSafeText(label)}</text>
            </svg>
        `;
        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }

    function getItemImage(item, name, category) {
        const picked = item.image || item.image_url || item.thumbnail || item.photo || '';
        if (typeof picked === 'string' && (picked.startsWith('http://') || picked.startsWith('https://') || picked.startsWith('data:image'))) {
            return picked;
        }
        const id = String(item.item_id || item.id || '').trim();
        if (id && MENU_IMAGE_BY_ID[id]) {
            return MENU_IMAGE_BY_ID[id];
        }
        return buildPlaceholderImage(name, category);
    }

    function renderCategoryFilters() {
        if (!menuCategoryRow) return;
        const categories = Array.from(new Set(currentMenuItems.map((item) => item._category)));
        const chips = ['all', ...categories];
        menuCategoryRow.innerHTML = chips.map((category) => {
            const label = category === 'all' ? 'Tat ca' : category;
            const encoded = encodeURIComponent(category);
            const activeClass = category === activeMenuCategory ? 'active' : '';
            return `<button class="menu-cat-chip ${activeClass}" data-category="${encoded}">${toSafeText(label)}</button>`;
        }).join('');

        menuCategoryRow.querySelectorAll('.menu-cat-chip').forEach((chip) => {
            chip.addEventListener('click', () => {
                const raw = chip.getAttribute('data-category') || 'all';
                activeMenuCategory = decodeURIComponent(raw);
                renderCategoryFilters();
                renderMenuCards();
            });
        });
    }

    function renderMenuCards() {
        if (!menuItemsGrid) return;
        const byCategory = activeMenuCategory === 'all'
            ? currentMenuItems
            : currentMenuItems.filter((item) => item._category === activeMenuCategory);
        const visibleItems = byCategory;

        if (!Array.isArray(visibleItems) || visibleItems.length === 0) {
            menuItemsGrid.innerHTML = '<p class="menu-status">Khong tim thay mon phu hop.</p>';
            updateMenuPanelHeight(1);
            return;
        }

        menuItemsGrid.innerHTML = visibleItems.map((item) => {
            const name = item.name || 'Mon';
            const category = item._category || 'Menu';
            const stateClass = item.available ? 'ok' : 'off';
            const stateText = item.available ? 'Dang phuc vu' : 'Tam het';
            const image = getItemImage(item, name, category);
            const description = item.description || 'Khong co mo ta.';
            return `
                <article class="menu-item-card animate-item">
                    <img class="menu-item-media" src="${toSafeText(image)}" alt="${toSafeText(name)}" loading="lazy">
                    <p class="menu-item-meta">${toSafeText(category)}</p>
                    <h4 class="menu-item-name">${toSafeText(name)}</h4>
                    <p class="menu-item-desc">${toSafeText(description)}</p>
                    <p class="menu-item-price">${formatCurrencyVnd(item.price)}</p>
                    <span class="menu-item-state ${stateClass}">${stateText}</span>
                </article>
            `;
        }).join('');
        updateMenuPanelHeight(visibleItems.length);
    }

    function readMenuApiCandidates() {
        const defaults = [
            '/menu',
            'http://127.0.0.1:8011/menu',
            'http://localhost:8011/menu',
        ];
        try {
            const raw = localStorage.getItem(ADMIN_ENV_STORAGE_KEY);
            if (!raw) return defaults;
            const parsed = JSON.parse(raw);
            const configured = [];
            const menuApi = String(parsed.VITE_MENU_API_URL || '').trim()
                .replace('://127.0.0.1:8001/', '://127.0.0.1:8011/')
                .replace('://localhost:8001/', '://localhost:8011/');
            const coreApi = String(parsed.VITE_CORE_API_URL || '').trim()
                .replace('://127.0.0.1:8001', '://127.0.0.1:8011')
                .replace('://localhost:8001', '://localhost:8011');
            if (menuApi) configured.push(menuApi);
            if (coreApi) configured.push(`${coreApi.replace(/\/$/, '')}/menu`);
            return Array.from(new Set([...configured, ...defaults]));
        } catch {
            return defaults;
        }
    }

    function renderMenuItems(items) {
        if (!Array.isArray(items) || items.length === 0) {
            currentMenuItems = [];
            if (menuItemsGrid) menuItemsGrid.innerHTML = '<p class="menu-status">Chua co du lieu menu.</p>';
            if (menuCategoryRow) menuCategoryRow.innerHTML = '';
            return;
        }

        currentMenuItems = items.map((item) => ({
            ...item,
            _category: normalizeCategory(item),
        }));
        const availableCategories = new Set(currentMenuItems.map((item) => item._category));
        if (activeMenuCategory !== 'all' && !availableCategories.has(activeMenuCategory)) {
            activeMenuCategory = 'all';
        }
        renderCategoryFilters();
        renderMenuCards();
    }

    async function ensureMenuLoaded() {
        if (menuLoaded) return;
        const candidates = readMenuApiCandidates();
        if (menuStatus) menuStatus.textContent = 'Dang tai menu...';
        try {
            let lastError = null;
            for (const menuUrl of candidates) {
                if (menuStatus) menuStatus.textContent = `Dang tai tu ${menuUrl}`;
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 6000);
                    const response = await fetch(menuUrl, { method: 'GET', signal: controller.signal });
                    clearTimeout(timeout);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const contentType = response.headers.get('content-type') || '';
                    if (!contentType.includes('application/json')) {
                        throw new Error(`Unexpected content-type: ${contentType || 'unknown'}`);
                    }
                    const payload = await response.json();
                    const items = Array.isArray(payload) ? payload : (Array.isArray(payload?.items) ? payload.items : []);
                    renderMenuItems(items);
                    menuLoaded = true;
                    if (menuStatus) menuStatus.textContent = `Da tai ${items.length} mon`;
                    return;
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError || new Error('No menu endpoint reachable');
        } catch (error) {
            const fallbackItems = [
                { item_id: 'ts-tranchau', name: 'Tra sua tran chau', category: 'Tra sua', description: 'Dam tra thom sua, tran chau mem dai.', price: 45000, available: true, image_url: 'https://images.unsplash.com/photo-1558857563-b371033873b8?auto=format&fit=crop&w=1000&q=80' },
                { item_id: 'ca-phe-muoi', name: 'Ca phe muoi', category: 'Ca phe', description: 'Ca phe dam vi cung lop kem man ngot.', price: 42000, available: true, image_url: 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1000&q=80' },
                { item_id: 'tra-dao', name: 'Tra dao cam sa', category: 'Tra trai cay', description: 'Chua ngot can bang, huong sa thanh mat.', price: 48000, available: true, image_url: 'https://images.unsplash.com/photo-1499638673689-79a0b5115d87?auto=format&fit=crop&w=1000&q=80' },
            ];
            renderMenuItems(fallbackItems);
            if (menuStatus) menuStatus.textContent = 'Menu tam thoi (dang cho backend san sang)';
        }
    }

    async function initializeMiniCamera() {
        if (!cameraMiniVideo || !navigator.mediaDevices?.getUserMedia) {
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user' },
                audio: false,
            });
            miniCameraStream = stream;
            cameraMiniVideo.srcObject = stream;
            startPresenceGreetingDetection();
        } catch {}
    }
    
    // Initial reset
    loadRobotScalePercent();
    loadCameraPreviewVisible();
    resetRobot();
    renderChatMini();
    updateMiniCart([]);
    setupSpeechRecognition();
    setVoiceStatus('Dang cho khach vao vung camera...');
    updateMenuPanelHeight(3);
    void initializeMiniCamera();
    if (voiceMiniToggle) {
        voiceMiniToggle.addEventListener('click', () => {
            setVoiceListening(!voiceListening);
        });
    }
    window.addEventListener('resize', () => {
        renderMenuCards();
    });
    document.addEventListener('pointerdown', (event) => {
        if (!isMenuOpen) return;
        const target = event.target;
        if (!(target instanceof Node)) return;
        const clickedInsideMenu = menu?.contains(target);
        const clickedMenuButton = menuToggleDock?.contains(target);
        if (!clickedInsideMenu && !clickedMenuButton) {
            toggleMenu();
        }
    }, true);

    window.addEventListener('storage', (event) => {
        if (event.key === ROBOT_SCALE_STORAGE_KEY) {
            loadRobotScalePercent();
        }
        if (event.key === CAMERA_PREVIEW_VISIBLE_STORAGE_KEY) {
            loadCameraPreviewVisible();
        }
    });

    window.addEventListener('message', (event) => {
        if (event.origin !== window.location.origin) return;
        if (!event.data) return;
        if (event.data.type === 'orderrobot:robot-scale') {
            applyRobotScalePercent(Number(event.data.scalePercent));
            return;
        }
        if (event.data.type === 'orderrobot:camera-preview-visible') {
            applyCameraPreviewVisible(Boolean(event.data.visible));
        }
    });

    window.addEventListener('beforeunload', () => {
        if (presenceDetectionTimer) {
            window.clearInterval(presenceDetectionTimer);
            presenceDetectionTimer = null;
        }
        if (miniCameraStream) {
            miniCameraStream.getTracks().forEach((track) => track.stop());
            miniCameraStream = null;
        }
        if (activeGreetingAudio) {
            activeGreetingAudio.pause();
            activeGreetingAudio = null;
        }
        if (voiceRecognition) {
            try {
                voiceRecognition.stop();
            } catch {}
            voiceRecognition = null;
        }
    });
</script>
</body></html>
