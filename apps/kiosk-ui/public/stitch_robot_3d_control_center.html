    function readRobotStudioConfigFromStorage() {
        const fallback = window.OrderRobot?.createDefaultRobotStudioConfig
            ? window.OrderRobot.createDefaultRobotStudioConfig()
            : window.OrderRobot?.config?.defaultRobotStudioConfig || {};
        try {
            const raw = localStorage.getItem(ROBOT_STUDIO_CONFIG_STORAGE_KEY);
            if (!raw) return fallback;
            const parsed = JSON.parse(raw);
            return { ...fallback, ...parsed };
        } catch {
            return fallback;
        }
    }

    function applyRobotStudioConfig(config) {
        const safeConfig = config && typeof config === 'object'
            ? { ...readRobotStudioConfigFromStorage(), ...config }
            : readRobotStudioConfigFromStorage();
        robotController.applyStudioConfig(safeConfig);
    }

    function runRobotStudioCommand(payload) {
        const commandType = String(payload?.type || payload?.command || '').trim();
        if (!commandType) return;
        if (commandType === 'run-graph') {
            const graphId = String(payload?.graphId || '').trim();
            if (!graphId) return;
            void robotController.runGraph(graphId, payload?.context || {}).then((ran) => {
                if (ran === false && typeof setVoiceStatus === 'function') {
                    setVoiceStatus(`Graph ${graphId} khong chay duoc. Vui long kiem tra cau hinh.`);
                }
            });
            return;
        }
        if (commandType === 'stop-graph') {
            robotController.stopGraph();
            robotController.reset();
            return;
        }
        if (commandType === 'preview-action') {
            const actionId = String(payload?.actionId || '').trim();
            if (!actionId) return;
            void robotController.triggerCinematic(actionId).then((ran) => {
                if (ran === false && typeof setVoiceStatus === 'function') {
                    setVoiceStatus(`Action ${actionId} dang bi tat hoac khong ho tro.`);
                }
            });
        }
    }

    function startKioskHeartbeat() {
        const writeHeartbeat = () => {
            localStorage.setItem(KIOSK_HEARTBEAT_STORAGE_KEY, String(Date.now()));
        };
        writeHeartbeat();
        if (kioskHeartbeatTimer) {
            window.clearInterval(kioskHeartbeatTimer);
        }
        kioskHeartbeatTimer = window.setInterval(writeHeartbeat, 1500);
    }

        startKioskHeartbeat();
    }

        heroLanding: ['heroLanding', 'maidCurtseyBloom', 'auroraOrbit'],
        dance: ['dance', 'smileBounce', 'hugGesture', 'waiterServingSpin'],
        plasmaSurge: ['plasmaSurge', 'animeStarTrail', 'cheerSparkle'],
        zeroG: ['zeroG', 'pixelHeartStorm', 'heartRain'],
    };
    const manualActionCursor = {};
    function resolveManualActionAlias(actionId) {
        const safe = String(actionId || '').trim();
        const sequence = MANUAL_ACTION_ROTATION[safe];
        if (!Array.isArray(sequence) || sequence.length === 0) return safe;
        const cursor = Number.isFinite(manualActionCursor[safe]) ? manualActionCursor[safe] : 0;
        const selected = sequence[cursor % sequence.length];
        manualActionCursor[safe] = (cursor + 1) % sequence.length;
        return selected;
    }
    const robotArchitectureInfo = robotController.printInfo();

    function applyRobotScalePercent(scalePercent) {

    function applyCameraPreviewVisible(visible) {
        if (!cameraMiniPanel) return;
        if (isAdminPreviewMode) {
            cameraMiniPanel.classList.add('hidden-by-admin');
            return;
        }
        const isVisible = Boolean(visible);
        cameraMiniPanel.classList.toggle('hidden-by-admin', !isVisible);
    }

    function loadCameraPreviewVisible() {
        const raw = localStorage.getItem(CAMERA_PREVIEW_VISIBLE_STORAGE_KEY);
        applyCameraPreviewVisible(raw !== 'false');

    function clampPercent(value, fallback = 60) {
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) return fallback;
        return Math.max(0, Math.min(100, Math.round(numeric)));
    }

    function readMicNoiseFilterStrengthFromAdmin() {
        const rawStrength = localStorage.getItem(ADMIN_MIC_NOISE_FILTER_STRENGTH_KEY);
        if (rawStrength !== null) {
            return clampPercent(rawStrength, 60);
        }
        const rawLevel = String(localStorage.getItem(ADMIN_MIC_NOISE_FILTER_KEY) || '').toLowerCase().trim();
        if (rawLevel === 'off') return 0;
        if (rawLevel === 'strong') return 100;
        if (rawLevel === 'balanced') return 60;
        return 60;
    }

    function recalcPresenceSensitivity() {
        const normalized = micNoiseFilterStrength / 100;
        // Higher admin mic filter strength => keep listening more stable and reduce accidental auto-stop.
        presenceMotionThreshold = Math.max(8, Math.min(24, Math.round(22 - normalized * 10)));
        presenceAbsenceFrames = Math.max(4, Math.min(14, Math.round(4 + normalized * 10)));
        presenceHoldMs = Math.max(3500, Math.min(12000, Math.round(3500 + normalized * 8500)));
    }

    function syncMicSensitivityFromAdmin(options = {}) {
        const restartBackend = options.restartBackend === true;
        const nextStrength = readMicNoiseFilterStrengthFromAdmin();
        const changed = nextStrength !== micNoiseFilterStrength;
        micNoiseFilterStrength = nextStrength;
        recalcPresenceSensitivity();
        if (changed && restartBackend && voiceListening && voiceInputMode === 'backend') {
            void startBackendSpeechListening().catch(() => {});
        }
    }

    function getMicAudioConstraintsForKiosk() {
        if (micNoiseFilterStrength <= 20) {
            return {
                channelCount: 1,
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false,
            };
        }
        if (micNoiseFilterStrength >= 75) {
            return {
                channelCount: 1,
                sampleRate: 16000,
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true,
            };
        }
        return {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
        };
    }

    function markSpeechActivity() {
        lastSpeechActivityAt = Date.now();
    }

    function updateMenuPanelHeight(visibleCount) {
        if (!menu || !menuItemsGrid) return;
        const safeCount = Math.max(0, Number(visibleCount) || 0);
        const gap = 12;
        const minCardWidth = 210;
        const usableWidth = Math.max(menuItemsGrid.clientWidth, minCardWidth);
        const columns = Math.max(1, Math.floor(usableWidth / minCardWidth));
        const rows = Math.max(1, Math.ceil(safeCount / columns));
        const rowsClamped = Math.min(3, rows);
        const rowsHeight = rowsClamped * 248 + Math.max(0, rowsClamped - 1) * gap;
        const chromeHeight = 258;
        const minHeight = Math.round(window.innerHeight * 0.48);
        const maxHeight = Math.round(window.innerHeight * 0.88);
        const target = chromeHeight + rowsHeight;
        const finalHeight = Math.max(minHeight, Math.min(maxHeight, target));
        menu.style.height = `${finalHeight}px`;
        menuItemsGrid.style.overflowY = 'auto';
    }

    function normalizeAiApiUrl(value) {
        return String(value || '')
            .trim()
            .replace('://127.0.0.1:8002', '://127.0.0.1:8012')
            .replace('://localhost:8002', '://localhost:8012')
            .replace(/\/$/, '');
    }

    function readConfiguredAiApiUrl() {
        const fallback = 'http://127.0.0.1:8012';
        try {
            const raw = localStorage.getItem(ADMIN_ENV_STORAGE_KEY);
            if (!raw) return fallback;
            const parsed = JSON.parse(raw);
            const configured = normalizeAiApiUrl(parsed.VITE_AI_API_URL || '');
            return configured || fallback;
        } catch {
            return fallback;
        }
    }

    function getAiApiUrlCandidates() {
        const configured = readConfiguredAiApiUrl();
        return Array.from(
            new Set([
                configured,
                'http://127.0.0.1:8012',
                'http://localhost:8012',
                AI_RUNTIME_FALLBACK_URL,
                'http://localhost:18012',
            ]),
        ).map((item) => normalizeAiApiUrl(item)).filter(Boolean);
    }

    async function probeAiApiHealth(baseUrl) {
        const safeBase = normalizeAiApiUrl(baseUrl);
        if (!safeBase) return null;
        try {
            const controller = new AbortController();
            const timeoutId = window.setTimeout(() => controller.abort(), AI_RUNTIME_PROBE_TIMEOUT_MS);
            const response = await fetch(`${safeBase}/health`, {
                method: 'GET',
                signal: controller.signal,
            });
            window.clearTimeout(timeoutId);
            if (!response.ok) return null;
            return await response.json();
        } catch {
            return null;
        }
    }

    async function ensureAiApiUrlReady() {
        if (resolvedAiApiUrl) return resolvedAiApiUrl;
        if (aiApiProbeTask) return aiApiProbeTask;

        aiApiProbeTask = (async () => {
            const candidates = getAiApiUrlCandidates();

            for (const candidate of candidates) {
                const health = await probeAiApiHealth(candidate);
                const status = String(health?.status || '').toLowerCase();
                const hasRealtimeStack =
                    typeof health?.tts_engine === 'string' &&
                    String(health.tts_engine || '').trim().length > 0 &&
                    typeof health?.stt_model === 'string';
                if (status === 'ok' && hasRealtimeStack) {
                    resolvedAiApiUrl = candidate;
                    resolvedAiApiHealth = health;
                    resolvedAiHasRealtimeStack = true;
                    window.__ORDERROBOT_AI_RUNTIME = { url: resolvedAiApiUrl, health, hasRealtimeStack: true };
                    console.info('[ai-runtime] selected compatible endpoint:', resolvedAiApiUrl, health);
                    return resolvedAiApiUrl;
                }
            }

            for (const candidate of candidates) {
                const health = await probeAiApiHealth(candidate);
                if (String(health?.status || '').toLowerCase() === 'ok') {
                    resolvedAiApiUrl = candidate;
                    resolvedAiApiHealth = health;
                    resolvedAiHasRealtimeStack = false;
                    window.__ORDERROBOT_AI_RUNTIME = { url: resolvedAiApiUrl, health, hasRealtimeStack: false };
                    console.info('[ai-runtime] selected healthy fallback endpoint:', resolvedAiApiUrl, health);
                    return resolvedAiApiUrl;
                }
            }

            resolvedAiApiUrl = candidates[0] || 'http://127.0.0.1:8012';
            resolvedAiApiHealth = null;
            resolvedAiHasRealtimeStack = false;
            window.__ORDERROBOT_AI_RUNTIME = { url: resolvedAiApiUrl, health: null, hasRealtimeStack: false };
            return resolvedAiApiUrl;
        })().finally(() => {
            aiApiProbeTask = null;
        });

        return aiApiProbeTask;
    }

    function getAiApiUrl() {
        return resolvedAiApiUrl || readConfiguredAiApiUrl();
    }

            setFaceState('happy');
            void ensureMenuLoaded();
        } else {
            menu.classList.remove('active');
            document.body.classList.remove('menu-is-open');
            menuLabel.innerText = 'Menu';
            if (menuToggleDock) menuToggleDock.style.display = '';
            setFaceState('normal');
        }
    }

    function updateMiniCart(cart) {

    async function startConversationSession(source = 'camera', signal = undefined) {
        const aiApiUrl = await ensureAiApiUrlReady();
        const response = await fetch(`${aiApiUrl}/sessions/start`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ source }),
            signal,
        });
        if (!response.ok) {
            throw new Error(`start session failed: HTTP ${response.status}`);
        }
        const payload = await response.json();
        currentSessionId = payload?.session_id || currentSessionId;
        updateMiniCart(payload?.cart);
        return payload;
    }

    async function sendConversationTurn(sessionId, transcript, signal = undefined) {
        const aiApiUrl = await ensureAiApiUrlReady();
        const response = await fetch(`${aiApiUrl}/sessions/${encodeURIComponent(sessionId)}/turn`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ transcript }),
            signal,
        });
        if (!response.ok) {
            throw new Error(`turn failed: HTTP ${response.status}`);
        }
        return response.json();
    }

    async function streamConversationTurn(sessionId, transcript, onChunk, signal = undefined) {
        const aiApiUrl = await ensureAiApiUrlReady();
        const response = await fetch(`${aiApiUrl}/sessions/${encodeURIComponent(sessionId)}/turn/stream`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ transcript }),
            signal,
        });
        if (!response.ok) {
            throw new Error(`turn stream failed: HTTP ${response.status}`);
        }
        if (!response.body) {
            throw new Error('turn stream body is empty');
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            lines.forEach((line) => {
                const trimmed = line.trim();
                if (!trimmed) return;
                try {
                    const payload = JSON.parse(trimmed);
                    onChunk(payload);
                } catch {
                    // ignore malformed line
                }
            });
        }

        const trailing = buffer.trim();
        if (trailing) {
            try {
                onChunk(JSON.parse(trailing));
            } catch {
                // ignore malformed trailing payload
            }
        }
    }

    function decodeBase64AudioChunk(base64Value) {
        const raw = atob(String(base64Value || ''));
        const bytes = new Uint8Array(raw.length);
        for (let index = 0; index < raw.length; index += 1) {
            bytes[index] = raw.charCodeAt(index);
        }
        return bytes;
    }

    function isAbortError(error) {
        if (!error) return false;
        const name = String(error?.name || '').toLowerCase();
        const message = String(error?.message || '').toLowerCase();
        return name === 'aborterror' || message.includes('aborted') || message.includes('interrupt');
    }

    function interruptBotSpeech() {
        if (activeBotSpeechAbortController) {
            activeBotSpeechAbortController.abort();
            activeBotSpeechAbortController = null;
        }
        if (activeGreetingAudio) {
            try {
                activeGreetingAudio.pause();
            } catch {}
            activeGreetingAudio = null;
        }
        botSpeechActive = false;
    }

    function interruptTurnProcessingForUser() {
        if (activeTurnAbortController) {
            activeTurnAbortController.abort();
            activeTurnAbortController = null;
        }
    }

    function prioritizeUserSpeech() {
        interruptBotSpeech();
        interruptTurnProcessingForUser();
    }

    function createStreamingAudioPlayer() {
        if (activeGreetingAudio) {
            activeGreetingAudio.pause();
            activeGreetingAudio = null;
        }

        setFaceState('happy');
        botSpeechActive = true;

        let mode = 'auto';
        let finalized = false;
        let settled = false;

        // MPEG stream mode state (MediaSource)
        let mpegAudio = null;
        let mpegMediaSource = null;
        let mpegSourceBuffer = null;
        let mpegObjectUrl = '';
        let mpegPlaybackStarted = false;
        const mpegPendingChunks = [];

        // WAV segment queue mode state (VieNeu chunks)
        const wavPendingChunks = [];
        let wavPlaying = false;

        const looksLikeWavChunk = (chunk) =>
            chunk instanceof Uint8Array &&
            chunk.length >= 12 &&
            chunk[0] === 0x52 && // R
            chunk[1] === 0x49 && // I
            chunk[2] === 0x46 && // F
            chunk[3] === 0x46 && // F
            chunk[8] === 0x57 && // W
            chunk[9] === 0x41 && // A
            chunk[10] === 0x56 && // V
            chunk[11] === 0x45; // E

        let sourceBuffer = null;

        let resolveDone;
        const donePromise = new Promise((resolve) => {
            resolveDone = resolve;
        });

        const complete = () => {
            if (settled) return;
            settled = true;
            if (mpegObjectUrl) {
                URL.revokeObjectURL(mpegObjectUrl);
                mpegObjectUrl = '';
            }
            if (activeGreetingAudio === mpegAudio) {
                activeGreetingAudio = null;
            }
            botSpeechActive = false;
            if (!isMenuOpen && !robotController.isCinematicRunning) {
                setFaceState('normal');
            }
            resolveDone();
        };

        const flushMpeg = () => {
            if (!mpegSourceBuffer || mpegSourceBuffer.updating) return;
            const nextChunk = mpegPendingChunks.shift();
            if (nextChunk) {
                mpegSourceBuffer.appendBuffer(nextChunk);
                if (!mpegPlaybackStarted && mpegAudio) {
                    mpegPlaybackStarted = true;
                    void mpegAudio.play().catch(() => {
                        complete();
                    });
                }
                return;
            }
            if (finalized && mpegMediaSource && mpegMediaSource.readyState === 'open') {
                try {
                    mpegMediaSource.endOfStream();
                } catch {}
                if (!mpegPlaybackStarted) {
                    complete();
                }
            }
        };

        const initMpegMode = () => {
            if (mpegMediaSource || settled) return;
            if (typeof MediaSource === 'undefined' || !MediaSource.isTypeSupported('audio/mpeg')) {
                complete();
                return;
            }

            mpegAudio = new Audio();
            mpegMediaSource = new MediaSource();
            mpegObjectUrl = URL.createObjectURL(mpegMediaSource);
            mpegAudio.src = mpegObjectUrl;
            mpegAudio.preload = 'auto';
            activeGreetingAudio = mpegAudio;
            mpegAudio.onended = complete;
            mpegAudio.onerror = complete;

            mpegMediaSource.addEventListener('sourceopen', () => {
                try {
                    mpegSourceBuffer = mpegMediaSource.addSourceBuffer('audio/mpeg');
                    mpegSourceBuffer.mode = 'sequence';
                    mpegSourceBuffer.addEventListener('updateend', flushMpeg);
                    flushMpeg();
                } catch {
                    complete();
                }
            });
        };

        const playNextWavChunk = () => {
            if (settled || wavPlaying) return;
            const nextChunk = wavPendingChunks.shift();
            if (!nextChunk) {
                if (finalized) {
                    complete();
                }
                return;
            }

            wavPlaying = true;
            const wavBlob = new Blob([nextChunk], { type: 'audio/wav' });
            const wavUrl = URL.createObjectURL(wavBlob);
            const wavAudio = new Audio(wavUrl);
            wavAudio.preload = 'auto';
            activeGreetingAudio = wavAudio;

            const finishChunk = () => {
                URL.revokeObjectURL(wavUrl);
                if (activeGreetingAudio === wavAudio) {
                    activeGreetingAudio = null;
                }
                wavPlaying = false;
                if (wavPendingChunks.length === 0 && finalized) {
                    complete();
                    return;
                }
                playNextWavChunk();
            };

            wavAudio.onended = finishChunk;
            wavAudio.onerror = finishChunk;
            void wavAudio.play().catch(() => {
                finishChunk();
            });
        };

        return {
            appendChunk: (chunk) => {
                if (!(chunk instanceof Uint8Array) || chunk.length === 0 || settled) return;
                const safeChunk = new Uint8Array(chunk.length);
                safeChunk.set(chunk);

                if (mode === 'auto') {
                    mode = looksLikeWavChunk(safeChunk) ? 'wav' : 'mpeg';
                    if (mode === 'mpeg') {
                        initMpegMode();
                    }
                }

                if (mode === 'wav') {
                    wavPendingChunks.push(safeChunk);
                    playNextWavChunk();
                    return;
                }

                mpegPendingChunks.push(safeChunk);
                flushMpeg();
            },
            finalize: async () => {
                finalized = true;
                if (mode === 'wav') {
                    if (!wavPlaying && wavPendingChunks.length === 0) {
                        complete();
                    }
                } else if (mode === 'mpeg') {
                    flushMpeg();
                } else {
                    complete();
                }
                await donePromise;
            },
            cancel: () => {
                finalized = true;
                complete();
            },
        };
    }

    async function playBotSpeech(text) {
        const safeText = String(text || '').trim();
        if (!safeText) return;

        interruptBotSpeech();
        const speechAbortController = new AbortController();
        activeBotSpeechAbortController = speechAbortController;

        const streamPlayer = createStreamingAudioPlayer();
        if (streamPlayer) {
            try {
                const aiApiUrl = await ensureAiApiUrlReady();
                const response = await fetch(`${aiApiUrl}/speech/synthesize/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: safeText }),
                    signal: speechAbortController.signal,
                });
                if (!response.ok || !response.body) {
                    throw new Error(`synthesize stream failed: HTTP ${response.status}`);
                }

                const reader = response.body.getReader();
                while (true) {
                    if (speechAbortController.signal.aborted) {
                        throw new Error('bot speech interrupted');
                    }
                    const { done, value } = await reader.read();
                    if (done) break;
                    if (value) {
                        streamPlayer.appendChunk(value);
                    }
                }
                await streamPlayer.finalize();
                if (activeBotSpeechAbortController === speechAbortController) {
                    activeBotSpeechAbortController = null;
                }
                return;
            } catch (error) {
                if (isAbortError(error)) {
                    streamPlayer.cancel();
                    if (activeBotSpeechAbortController === speechAbortController) {
                        activeBotSpeechAbortController = null;
                    }
                    return;
                }
                console.warn('[voice-tts-stream] fallback to blob playback:', error);
            }
        }

        const aiApiUrl = await ensureAiApiUrlReady();
        const response = await fetch(`${aiApiUrl}/speech/synthesize`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: safeText }),
            signal: speechAbortController.signal,
        });
        if (!response.ok) {
            throw new Error(`synthesize failed: HTTP ${response.status}`);
        }

        const blob = await response.blob();
        const audioUrl = URL.createObjectURL(blob);
        try {
            if (activeGreetingAudio) {
                activeGreetingAudio.pause();
                activeGreetingAudio = null;
            }
            const audio = new Audio(audioUrl);
            activeGreetingAudio = audio;
            audio.preload = 'auto';
            setFaceState('happy');
            botSpeechActive = true;
            try {
                await audio.play();
            } catch {
                if (speechAbortController.signal.aborted) {
                    return;
                }
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(safeText);
                    utterance.lang = 'vi-VN';
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(utterance);
                    await new Promise((resolve) => {
                        utterance.onend = () => resolve();
                        utterance.onerror = () => resolve();
                    });
                }
                return;
            }
            await new Promise((resolve) => {
                audio.onended = () => resolve();
                audio.onerror = () => resolve();
            });
        } finally {
            if (activeBotSpeechAbortController === speechAbortController) {
                activeBotSpeechAbortController = null;
            }
            URL.revokeObjectURL(audioUrl);
            activeGreetingAudio = null;
            botSpeechActive = false;
            if (!isMenuOpen && !robotController.isCinematicRunning) {
                setFaceState('normal');
            }
        }
    }

    function enqueueUserTurn(transcript) {
        const cleanText = String(transcript || '').trim();
        if (!cleanText) return;
        markSpeechActivity();
        prioritizeUserSpeech();
        if (voiceQueueRunning) {
            pendingUserTurns.unshift(cleanText);
        } else {
            pendingUserTurns.push(cleanText);
        }
        if (pendingUserTurns.length > 12) {
            pendingUserTurns.length = 12;
        }
        if (!voiceQueueRunning) {
            void processVoiceQueue();
        }
    }

    function shouldOpenMenuFromText(text) {
        const normalized = String(text || '').toLowerCase();
        return /(xem|mo|mở).*(menu|thuc don|thực đơn)|menu/i.test(normalized);
    }

    function shouldCloseMenuFromText(text) {
        const normalized = String(text || '').toLowerCase();
        return /(dong|đóng|an|ẩn).*(menu|thuc don|thực đơn)|tat menu|tắt menu/i.test(normalized);
    }

    function inferVoiceIntent(text) {
        const normalized = String(text || '').toLowerCase();
        if (shouldOpenMenuFromText(normalized)) return 'menuOpen';
        if (shouldCloseMenuFromText(normalized)) return 'menuClose';
        if (/(chao|xin chao|hello|hi)/i.test(normalized)) return 'greeting';
        if (/(de thuong|cute|de yeu|xinh)/i.test(normalized)) return 'cute';
        return 'general';
    }

    function inferActionHintsFromText(text) {
        const normalized = String(text || '').toLowerCase();
        const hints = [];
        if (/(hôn|hon|hôn gió|hun gio)/i.test(normalized)) hints.push('blowKissHearts');
        if (/(tim|trai tim|heart)/i.test(normalized)) hints.push('heartRain');
        if (/(vay tay|chao)/i.test(normalized)) hints.push('waveHello');
        if (/(nhay|dance|quay)/i.test(normalized)) hints.push('dance');
        if (/(ôm|om|hug)/i.test(normalized)) hints.push('hugGesture');
        if (/(de thuong|cute|de yeu)/i.test(normalized)) hints.push('smileBounce');
        if (/(hau gai|hầu gái|curtsey|cuoi dam)/i.test(normalized)) hints.push('maidCurtseyBloom');
        if (/(boi ban|bồi bàn|serve|phuc vu)/i.test(normalized)) hints.push('waiterServingSpin');
        if (/(anime|sao bang|star trail)/i.test(normalized)) hints.push('animeStarTrail');
        if (/(bao tim|heart storm|mua tim manh)/i.test(normalized)) hints.push('pixelHeartStorm');
        if (/(aurora|bac cuc quang|orbit)/i.test(normalized)) hints.push('auroraOrbit');
        return hints;
    }

    async function processVoiceQueue() {
        if (voiceQueueRunning) return;
        voiceQueueRunning = true;
        try {
            while (pendingUserTurns.length > 0) {
                const userText = pendingUserTurns.shift();
                if (!userText) continue;

                appendChat('user', userText);
                setVoiceStatus('Dang gui len backend...');
                const userIntent = inferVoiceIntent(userText);
                if (userIntent === 'menuOpen') {
                    void robotController.dispatchTrigger('voice.intent.menuOpen', { intent: 'menuOpen', scene: 'intent', emotion: 'focused' });
                }
                if (userIntent === 'menuClose') {
                    void robotController.dispatchTrigger('voice.intent.menuClose', { intent: 'menuClose', scene: 'intent', emotion: 'focused' });
                }
                if (shouldOpenMenuFromText(userText) && !isMenuOpen) {
                    toggleMenu();
                }
                if (shouldCloseMenuFromText(userText) && isMenuOpen) {
                    toggleMenu();
                }

                const turnAbortController = new AbortController();
                activeTurnAbortController = turnAbortController;

                try {
                    if (!currentSessionId) {
                        const sessionPayload = await startConversationSession('manual', turnAbortController.signal);
                        const opening = String(sessionPayload?.reply_text || '').trim();
                        if (opening && chatHistory.length < 3) {
                            appendChat('assistant', opening);
                        }
                    }

                    if (!currentSessionId) {
                        throw new Error('Khong tao duoc session.');
                    }

                    let replyPayload = null;
                    let replyText = '';
                    let streamedAudioChunks = 0;
                    let streamPlayer = createStreamingAudioPlayer();

                    try {
                        await streamConversationTurn(currentSessionId, userText, (chunk) => {
                            if (chunk?.type === 'text') {
                                replyPayload = chunk;
                                replyText = String(chunk.content || '').trim();
                                if (Array.isArray(chunk.cart)) {
                                    updateMiniCart(chunk.cart);
                                }
                                return;
                            }
                            if (chunk?.type === 'audio' && streamPlayer && chunk.content) {
                                streamedAudioChunks += 1;
                                streamPlayer.appendChunk(decodeBase64AudioChunk(chunk.content));
                            }
                        }, turnAbortController.signal);
                    } catch (streamError) {
                        if (isAbortError(streamError)) {
                            throw streamError;
                        }
                        console.warn('[voice-turn-stream] fallback to legacy turn endpoint:', streamError);
                        replyPayload = await sendConversationTurn(currentSessionId, userText, turnAbortController.signal);
                        replyText = String(replyPayload?.reply_text || '').trim();
                        updateMiniCart(replyPayload?.cart);
                    } finally {
                        if (streamPlayer) {
                            if (turnAbortController.signal.aborted) {
                                streamPlayer.cancel();
                            } else {
                                await streamPlayer.finalize();
                            }
                        }
                    }

                    const backendScene = String(replyPayload?.scene || '').trim();
                    const backendEmotionHint = String(replyPayload?.emotion_hint || '').trim();
                    const backendActionHints = Array.isArray(replyPayload?.action_hints)
                        ? replyPayload.action_hints
                        : [];
                    const localActionHints = inferActionHintsFromText(`${userText} ${replyText}`);
                    const mergedActionHints = backendActionHints.length > 0
                        ? Array.from(new Set(backendActionHints))
                        : localActionHints;
                    if (replyPayload?.order_created) {
                        currentSessionId = null;
                        setVoiceStatus(`Da chot don ${replyPayload.order_id || ''}`.trim());
                    }
                    if (replyText) {
                        appendChat('assistant', replyText);
                        if (streamedAudioChunks === 0 && !turnAbortController.signal.aborted) {
                            setVoiceStatus('Robot dang tra loi...');
                            await playBotSpeech(replyText);
                        }
                        robotController.reactToConversation({
                            scene: backendScene || inferVoiceIntent(replyText),
                            emotionHint: backendEmotionHint || (inferVoiceIntent(replyText) === 'cute' ? 'cute' : 'happy'),
                            actionHints: mergedActionHints,
                            intent: userIntent,
                        });
                        if (backendScene) {
                            void robotController.dispatchTrigger(`voice.scene.${backendScene}`, {
                                scene: backendScene,
                                intent: userIntent,
                                emotion: backendEmotionHint || 'neutral',
                            });
                        }
                        if (shouldOpenMenuFromText(replyText) && !isMenuOpen) {
                            toggleMenu();
                        }
                        if (shouldCloseMenuFromText(replyText) && isMenuOpen) {
                            toggleMenu();
                        }
                    }
                    setVoiceStatus(voiceListening ? 'Dang nghe ban noi...' : 'Da tra loi xong.');
                } catch (error) {
                    if (isAbortError(error)) {
                        setVoiceStatus('Dang uu tien loi noi moi...');
                    } else {
                        console.warn('[voice-turn] failed:', error);
                        setVoiceStatus('Gap loi khi xu ly hoi thoai.');
                    }
                } finally {
                    if (activeTurnAbortController === turnAbortController) {
                        activeTurnAbortController = null;
                    }
                }
            }
        } finally {
            voiceQueueRunning = false;
            if (voiceListening) {
                setVoiceStatus('Dang nghe ban noi...');
            }
        }
    }

    function buildSpeechWebSocketUrl(aiApiBaseUrl = getAiApiUrl()) {
        const httpUrl = new URL(aiApiBaseUrl);
        httpUrl.protocol = httpUrl.protocol === 'https:' ? 'wss:' : 'ws:';
        httpUrl.pathname = '/speech/transcribe/ws';
        httpUrl.search = '';
        httpUrl.hash = '';
        return httpUrl.toString();
    }

    function pickBackendRecorderMimeType() {
        const candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus'];
        for (const mimeType of candidates) {
            if (window.MediaRecorder && MediaRecorder.isTypeSupported(mimeType)) {
                return mimeType;
            }
        }
        return '';
    }

    function clearBackendFinalizeTimer() {
        if (voiceBackendFinalizeTimer) {
            window.clearTimeout(voiceBackendFinalizeTimer);
            voiceBackendFinalizeTimer = null;
        }
    }

    function scheduleBackendFinalize() {
        clearBackendFinalizeTimer();
        voiceBackendFinalizeTimer = window.setTimeout(() => {
            if (!voiceListening || voiceInputMode !== 'backend' || !voiceBackendSocket) return;
            if (voiceBackendSocket.readyState !== WebSocket.OPEN) return;
            if (voiceBackendFinalizing) return;
            try {
                voiceBackendFinalizing = true;
                voiceBackendSocket.send('finalize');
            } catch {}
        }, BACKEND_STT_FINALIZE_SILENCE_MS);
    }

    async function ensureBackendMicStream() {
        if (voiceBackendStream && voiceBackendStream.active) {
            return voiceBackendStream;
        }
        voiceBackendStream = await navigator.mediaDevices.getUserMedia({
            audio: getMicAudioConstraintsForKiosk(),
            video: false,
        });
        return voiceBackendStream;
    }

    async function openBackendSpeechSocket() {
        if (voiceBackendSocket && voiceBackendSocket.readyState === WebSocket.OPEN) {
            return voiceBackendSocket;
        }
        if (voiceBackendSocket && voiceBackendSocket.readyState === WebSocket.CONNECTING) {
            await new Promise((resolve, reject) => {
                const timeoutId = window.setTimeout(() => {
                    reject(new Error('Backend STT websocket timeout'));
                }, 3500);
                const handleOpen = () => {
                    window.clearTimeout(timeoutId);
                    resolve();
                };
                const handleError = () => {
                    window.clearTimeout(timeoutId);
                    reject(new Error('Backend STT websocket error'));
                };
                voiceBackendSocket.addEventListener('open', handleOpen, { once: true });
                voiceBackendSocket.addEventListener('error', handleError, { once: true });
            });
            return voiceBackendSocket;
        }

        const aiApiUrl = await ensureAiApiUrlReady();
        voiceBackendSocket = new WebSocket(buildSpeechWebSocketUrl(aiApiUrl));
        voiceBackendSocket.binaryType = 'arraybuffer';

        voiceBackendSocket.onmessage = (event) => {
            let payload = null;
            try {
                payload = JSON.parse(String(event.data));
            } catch {
                return;
            }
            if (!payload || typeof payload !== 'object') return;

            if (payload.type === 'partial') {
                const partialText = String(payload.transcript || '').trim();
                if (partialText) {
                    markSpeechActivity();
                    if (botSpeechActive) {
                        prioritizeUserSpeech();
                    }
                    setVoiceStatus(`Dang nghe: ${partialText}`);
                }
                return;
            }

            if (payload.type === 'final') {
                voiceBackendFinalizing = false;
                const transcript = String(payload.transcript || '').trim();
                const status = String(payload.status || '').toLowerCase();
                const now = Date.now();

                if (status === 'ok' && transcript) {
                    markSpeechActivity();
                    if (botSpeechActive) {
                        prioritizeUserSpeech();
                    }
                    if (transcript === voiceBackendLastFinal && now - voiceBackendLastFinalAt < 1800) {
                        return;
                    }
                    voiceBackendLastFinal = transcript;
                    voiceBackendLastFinalAt = now;
                    enqueueUserTurn(transcript);
                    return;
                }

                if (status === 'retry') {
                    setVoiceStatus(String(payload.message || 'Minh nghe chua ro, ban noi lai giup minh nhe.'));
                    return;
                }
            }
        };

        voiceBackendSocket.onerror = () => {
            if (!voiceListening || voiceInputMode !== 'backend') return;
            setVoiceStatus('Backend STT websocket gap loi, dang thu ket noi lai...');
        };

        voiceBackendSocket.onclose = () => {
            voiceBackendSocket = null;
            voiceBackendFinalizing = false;
            if (voiceListening && voiceInputMode === 'backend') {
                window.setTimeout(() => {
                    if (!voiceListening || voiceInputMode !== 'backend') return;
                    void startBackendSpeechListening().catch(() => {});
                }, 280);
            }
        };

        await new Promise((resolve, reject) => {
            const socket = voiceBackendSocket;
            const timeoutId = window.setTimeout(() => {
                reject(new Error('Backend STT websocket timeout'));
            }, 3500);
            socket.addEventListener('open', () => {
                window.clearTimeout(timeoutId);
                resolve();
            }, { once: true });
            socket.addEventListener('error', () => {
                window.clearTimeout(timeoutId);
                reject(new Error('Backend STT websocket error'));
            }, { once: true });
        });

        return voiceBackendSocket;
    }

    function stopBackendSpeechListening(options = {}) {
        const finalize = options.finalize === true;
        clearBackendFinalizeTimer();
        voiceBackendFinalizing = false;
        if (voiceInputMode === 'backend') {
            voiceInputMode = 'idle';
        }
        if (voiceBackendRecorder) {
            try {
                if (finalize && voiceBackendSocket && voiceBackendSocket.readyState === WebSocket.OPEN) {
                    voiceBackendSocket.send('finalize');
                }
                if (voiceBackendRecorder.state !== 'inactive') {
                    voiceBackendRecorder.stop();
                }
            } catch {}
            voiceBackendRecorder = null;
        }
        if (voiceBackendSocket) {
            try {
                voiceBackendSocket.close();
            } catch {}
            voiceBackendSocket = null;
        }
        if (voiceBackendStream) {
            try {
                voiceBackendStream.getTracks().forEach((track) => track.stop());
            } catch {}
            voiceBackendStream = null;
        }
    }

    async function startBackendSpeechListening() {
        if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === 'undefined') {
            throw new Error('Trinh duyet khong ho tro backend STT streaming.');
        }

        stopBackendSpeechListening({ finalize: false });

        const stream = await ensureBackendMicStream();
        const socket = await openBackendSpeechSocket();
        const mimeType = pickBackendRecorderMimeType();
        voiceBackendRecorder = mimeType
            ? new MediaRecorder(stream, { mimeType })
            : new MediaRecorder(stream);

        socket.send('start:caption:speech.webm');
        voiceBackendFinalizing = false;

        voiceBackendRecorder.ondataavailable = (event) => {
            if (!event.data || event.data.size <= 0) return;
            if (!voiceBackendSocket || voiceBackendSocket.readyState !== WebSocket.OPEN) return;
            try {
                voiceBackendSocket.send(event.data);
                voiceBackendSocket.send('flush');
                scheduleBackendFinalize();
            } catch {}
        };

        voiceBackendRecorder.onerror = () => {
            setVoiceStatus('Mic gap loi khi thu am backend STT.');
        };

        voiceBackendRecorder.start(BACKEND_STT_CHUNK_MS);
        voiceInputMode = 'backend';
        setVoiceStatus('Dang nghe ban noi...');
    }

    async function fallbackToBackendStt(reasonText) {
        try {
            if (voiceRecognition) {
                voiceRecognition.stop();
            }
        } catch {}
        try {
            await startBackendSpeechListening();
            if (reasonText) {
                setVoiceStatus(reasonText);
            }
        } catch (error) {
            console.warn('[backend-stt] fallback failed:', error);
            const detail = error instanceof Error ? error.message : String(error || '');
            setVoiceStatus(`Khong bat duoc STT. Hay cap quyen microphone roi thu lai. ${detail}`.trim());
        }
    }

    function setupSpeechRecognition() {
        const RecognitionClass = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!RecognitionClass) {
            setVoiceStatus('Trinh duyet nay khong ho tro STT browser, chuyen sang backend STT.');
            return;
        }

        voiceRecognition = new RecognitionClass();
        voiceRecognition.lang = 'vi-VN';
        voiceRecognition.continuous = true;
        voiceRecognition.interimResults = true;
        voiceRecognition.maxAlternatives = 1;

        voiceRecognition.onresult = (event) => {
            if (voiceInputMode !== 'browser') return;
            let interim = '';
            const finals = [];
            for (let index = event.resultIndex; index < event.results.length; index += 1) {
                const result = event.results[index];
                const text = String(result[0]?.transcript || '').trim();
                if (!text) continue;
                if (result.isFinal) {
                    finals.push(text);
                } else {
                    interim += `${text} `;
                }
            }

            if (interim.trim()) {
                markSpeechActivity();
                if (botSpeechActive) {
                    prioritizeUserSpeech();
                }
                setVoiceStatus(`Dang nghe: ${interim.trim()}`);
                if (activeGreetingAudio) {
                    activeGreetingAudio.pause();
                    activeGreetingAudio = null;
                }
            }
            finals.forEach((text) => {
                if (botSpeechActive) {
                    prioritizeUserSpeech();
                }
                enqueueUserTurn(text);
            });
        };

        voiceRecognition.onerror = (event) => {
            if (!voiceListening || voiceInputMode !== 'browser') return;
            const errCode = String(event?.error || '').toLowerCase();
            const fallbackErrors = ['audio-capture', 'not-allowed', 'service-not-allowed', 'network', 'language-not-supported'];
            if (fallbackErrors.includes(errCode)) {
                void fallbackToBackendStt('STT browser khong on dinh, da chuyen sang backend STT.');
                return;
            }
            setVoiceStatus('STT gap loi, dang thu ket noi lai...');
        };

        voiceRecognition.onend = () => {
            if (!voiceListening || voiceInputMode !== 'browser') return;
            window.setTimeout(() => {
                if (!voiceListening || !voiceRecognition) return;
                try {
                    voiceRecognition.start();
                } catch {}
            }, 200);
        };
    }

    function setVoiceListening(enabled, source = 'system') {
        const nextEnabled = Boolean(enabled);
        if (!nextEnabled && source !== 'manual' && voicePinnedByUser) {
            setVoiceStatus('Dang nghe thu cong, bo qua auto-stop.');
            return;
        }

        if (source === 'manual') {
            voicePinnedByUser = nextEnabled;
        }

        voiceListening = nextEnabled;
        if (voiceMiniToggle) {
            voiceMiniToggle.classList.toggle('active', voiceListening);
            voiceMiniToggle.textContent = voiceListening ? 'Dung nghe' : 'Bat nghe';
        }

        if (!voiceListening) {
            interruptTurnProcessingForUser();
            interruptBotSpeech();
            pendingUserTurns.length = 0;
            try {
                if (voiceRecognition) {
                    voiceRecognition.stop();
                }
            } catch {}
            stopBackendSpeechListening({ finalize: true });
            voiceInputMode = 'idle';
            setVoiceStatus('Da dung nghe.');
            return;
        }

        const startPipeline = async () => {
            syncMicSensitivityFromAdmin({ restartBackend: false });
            if (!voiceRecognition) {
                setupSpeechRecognition();
            }

            try {
                await ensureAiApiUrlReady();
                if (resolvedAiHasRealtimeStack) {
                    await startBackendSpeechListening();
                    setVoiceStatus('Dang nghe ban noi...');
                    return;
                }
            } catch (backendError) {
                console.warn('[stt] backend streaming unavailable:', backendError);
            }

            if (voiceRecognition) {
                try {
                    voiceRecognition.start();
                    voiceInputMode = 'browser';
                    setVoiceStatus('Dang nghe ban noi...');
                    return;
                } catch (browserError) {
                    console.warn('[stt] browser speech start failed:', browserError);
                }
            }

            setVoiceStatus('Khong bat duoc STT, hay cap quyen microphone roi thu lai.');
            voiceListening = false;
            if (source === 'manual') {
                voicePinnedByUser = false;
            }
            if (voiceMiniToggle) {
                voiceMiniToggle.classList.remove('active');
                voiceMiniToggle.textContent = 'Bat nghe';
            }
            stopBackendSpeechListening({ finalize: false });
            voiceInputMode = 'idle';
        };

        void startPipeline();
    }

    function sampleMotionScore(video) {
        if (!video || video.readyState < 2 || !video.videoWidth || !video.videoHeight) {
            return 0;
        }

        const sampleWidth = 96;
        const sampleHeight = 54;
        const canvas = sampleMotionScore.canvas || document.createElement('canvas');
        const ctx = sampleMotionScore.ctx || canvas.getContext('2d', { willReadFrequently: true });
        sampleMotionScore.canvas = canvas;
        sampleMotionScore.ctx = ctx;
        if (!ctx) return 0;

        canvas.width = sampleWidth;
        canvas.height = sampleHeight;
        ctx.drawImage(video, 0, 0, sampleWidth, sampleHeight);
        const imageData = ctx.getImageData(0, 0, sampleWidth, sampleHeight).data;

        const step = 4;
        const lumaNow = new Float32Array((sampleWidth / step) * (sampleHeight / step));
        let ptr = 0;
        for (let y = 0; y < sampleHeight; y += step) {
            for (let x = 0; x < sampleWidth; x += step) {
                const offset = (y * sampleWidth + x) * 4;
                const r = imageData[offset];
                const g = imageData[offset + 1];
                const b = imageData[offset + 2];
                lumaNow[ptr++] = 0.299 * r + 0.587 * g + 0.114 * b;
            }
        }

        if (!previousFrameLuma || previousFrameLuma.length !== lumaNow.length) {
            previousFrameLuma = lumaNow;
            return 0;
        }

        let diffSum = 0;
        for (let index = 0; index < lumaNow.length; index += 1) {
            diffSum += Math.abs(lumaNow[index] - previousFrameLuma[index]);
        }
        previousFrameLuma = lumaNow;
        return diffSum / lumaNow.length;
    }
    sampleMotionScore.canvas = null;
    sampleMotionScore.ctx = null;

    function startPresenceGreetingDetection() {
        if (!cameraMiniVideo || presenceDetectionTimer) return;
        presenceDetectionTimer = window.setInterval(() => {
            const now = Date.now();
            const motionScore = sampleMotionScore(cameraMiniVideo);
            if (motionScore >= presenceMotionThreshold) {
                absenceFrames = 0;
                if (!presenceDetected) {
                    presenceDetected = true;
                    presenceEnteredAt = now;
                    setVoiceStatus('Da thay khach, robot bat dau chao va nghe.');
                    void robotController.dispatchTrigger('presence.enter', {
                        presence: 'enter',
                        scene: 'greeting',
                        emotion: 'cute',
                    });
                    void runAutoGreeting();
                    setVoiceListening(true, 'presence');
                }
                return;
            }

            absenceFrames += 1;
            const inPresenceHold = presenceDetected && now - presenceEnteredAt < presenceHoldMs;
            const recentlySpoke = voiceListening && (now - lastSpeechActivityAt) < Math.max(5000, presenceHoldMs);
            const busyConversation = voiceQueueRunning || pendingUserTurns.length > 0 || botSpeechActive || Boolean(activeTurnAbortController);

            if (inPresenceHold || recentlySpoke || busyConversation) {
                absenceFrames = Math.min(absenceFrames, Math.max(0, presenceAbsenceFrames - 1));
                return;
            }

            if (absenceFrames >= presenceAbsenceFrames) {
                if (presenceDetected) {
                    setVoiceStatus('Dang cho khach vao vung camera...');
                    void robotController.dispatchTrigger('presence.leave', {
                        presence: 'leave',
                        scene: 'idle',
                        emotion: 'neutral',
                    });
                    setVoiceListening(false, 'presence');
                }
                presenceDetected = false;
                presenceEnteredAt = 0;
            }
        }, PRESENCE_CHECK_INTERVAL_MS);
    }

    function readMenuApiCandidates() {
        const defaults = [
            '/menu',
            'http://127.0.0.1:8011/menu',
            'http://localhost:8011/menu',
            'http://127.0.0.1:18011/menu',
            'http://localhost:18011/menu',
        ];
        try {
            const raw = localStorage.getItem(ADMIN_ENV_STORAGE_KEY);
            if (!raw) return defaults;
            const parsed = JSON.parse(raw);
            const configured = [];
            const menuApi = String(parsed.VITE_MENU_API_URL || '').trim()
                .replace('://127.0.0.1:8001/', '://127.0.0.1:8011/')
                .replace('://localhost:8001/', '://localhost:8011/');
            const coreApi = String(parsed.VITE_CORE_API_URL || '').trim()
                .replace('://127.0.0.1:8001', '://127.0.0.1:8011')
                .replace('://localhost:8001', '://localhost:8011');
            if (menuApi) configured.push(menuApi);
            if (coreApi) configured.push(`${coreApi.replace(/\/$/, '')}/menu`);
            return Array.from(new Set([...configured, ...defaults]));
        } catch {
            return defaults;
        }
    }

    function renderMenuItems(items) {

            if (menuCategoryRow) menuCategoryRow.innerHTML = '';
            return;
        }

        currentMenuItems = items.map((item) => ({
            ...item,
            _category: normalizeCategory(item),
        }));
        const availableCategories = new Set(currentMenuItems.map((item) => item._category));
        if (activeMenuCategory !== 'all' && !availableCategories.has(activeMenuCategory)) {
            activeMenuCategory = 'all';
        }
        renderCategoryFilters();
        renderMenuCards();
    }

    async function ensureMenuLoaded() {
        if (menuLoaded) return;
        const candidates = readMenuApiCandidates();
        if (menuStatus) menuStatus.textContent = 'Dang tai menu...';
        try {
            let lastError = null;
            for (const menuUrl of candidates) {
                if (menuStatus) menuStatus.textContent = `Dang tai tu ${menuUrl}`;
                try {
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 6000);
                    const response = await fetch(menuUrl, { method: 'GET', signal: controller.signal });
                    clearTimeout(timeout);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const contentType = response.headers.get('content-type') || '';
                    if (!contentType.includes('application/json')) {
                        throw new Error(`Unexpected content-type: ${contentType || 'unknown'}`);
                    }
                    const payload = await response.json();
                    const items = Array.isArray(payload) ? payload : (Array.isArray(payload?.items) ? payload.items : []);
                    renderMenuItems(items);
                    menuLoaded = true;
                    if (menuStatus) menuStatus.textContent = `Da tai ${items.length} mon`;
                    return;
                } catch (error) {
                    lastError = error;
                }
            }
            throw lastError || new Error('No menu endpoint reachable');
        } catch (error) {
            const fallbackItems = [
                { item_id: 'ts-tranchau', name: 'Tra sua tran chau', category: 'Tra sua', description: 'Dam tra thom sua, tran chau mem dai.', price: 45000, available: true, image_url: 'https://images.unsplash.com/photo-1558857563-b371033873b8?auto=format&fit=crop&w=1000&q=80' },

            renderMenuItems(fallbackItems);
            if (menuStatus) menuStatus.textContent = 'Menu tam thoi (dang cho backend san sang)';
        }
    }

        if (event.key === ROBOT_STUDIO_CONFIG_STORAGE_KEY) {
            applyRobotStudioConfig(readRobotStudioConfigFromStorage());
        }
        if (event.key === ROBOT_STUDIO_COMMAND_STORAGE_KEY) {
            try {
                if (!event.newValue) return;
                runRobotStudioCommand(JSON.parse(event.newValue));
            } catch {}
        }
    });

    window.addEventListener('message', (event) => {
        if (event.origin !== window.location.origin) return;
        if (!event.data) return;
        if (event.data.type === 'orderrobot:robot-scale') {
            applyRobotScalePercent(Number(event.data.scalePercent));
            return;
        }
        if (event.data.type === 'orderrobot:camera-preview-visible') {
            applyCameraPreviewVisible(Boolean(event.data.visible));
            return;
        }
        if (event.data.type === 'orderrobot:robot-studio-config') {
            applyRobotStudioConfig(event.data.config || {});
            return;
        }
        if (event.data.type === 'orderrobot:robot-studio-command') {
            runRobotStudioCommand(event.data);
            return;
        }
        if (event.data.type === 'orderrobot:admin-mic-noise-filter') {
            if (typeof event.data.strength === 'number' && Number.isFinite(event.data.strength)) {
                micNoiseFilterStrength = clampPercent(event.data.strength, micNoiseFilterStrength);
                recalcPresenceSensitivity();
            }
            syncMicSensitivityFromAdmin({ restartBackend: true });
        }
    });

    window.addEventListener('beforeunload', () => {
        if (kioskHeartbeatTimer) {
            window.clearInterval(kioskHeartbeatTimer);
            kioskHeartbeatTimer = null;
        }
        if (presenceDetectionTimer) {
            window.clearInterval(presenceDetectionTimer);
            presenceDetectionTimer = null;
        }
        if (miniCameraStream) {
            miniCameraStream.getTracks().forEach((track) => track.stop());
            miniCameraStream = null;
        }
        if (activeGreetingAudio) {
            activeGreetingAudio.pause();
            activeGreetingAudio = null;
        }
        if (voiceRecognition) {
            try {
                voiceRecognition.stop();
            } catch {}
            voiceRecognition = null;
        }
        stopBackendSpeechListening({ finalize: false });
    });
</script>
</body></html>
