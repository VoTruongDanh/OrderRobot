server {
    listen 80;
    server_name _;

    location /api/core/ {
        proxy_pass http://core:8011/;
    }

    location /api/ai/ {
        proxy_pass http://ai:8012/;
    }

    location /order-robot/ {
        rewrite ^/order-robot/(.*)$ /$1 break;
        proxy_pass http://ui:3000/;

    }

    # Static assets emitted by Vite are requested from /assets/* by default.
    location /assets/ {
        proxy_pass http://ui:3000/assets/;
    }

    # Public robot models folder is also served from the app root.
    location /robot-models/ {
        proxy_pass http://ui:3000/robot-models/;
    }

    # 3D control center page is requested from root path.
    location = /stitch_robot_3d_control_center.html {
        proxy_pass http://ui:3000/stitch_robot_3d_control_center.html;
    }

    # Fallback: handle root/query URLs like "/?storeid=9".
    location / {
        proxy_pass http://ui:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
