<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrderRobot Login</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(0, 216, 255, 0.22), transparent 32%),
          radial-gradient(circle at bottom, rgba(255, 0, 153, 0.16), transparent 34%),
          linear-gradient(135deg, #edf7ff 0%, #f7fbff 48%, #eef3ff 100%);
        color: #16364a;
      }
      .shell {
        width: min(540px, calc(100vw - 40px));
        padding: 30px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(98, 184, 222, 0.22);
        box-shadow: 0 28px 70px rgba(31, 77, 110, 0.18);
        backdrop-filter: blur(18px);
      }
      .eyebrow {
        margin: 0 0 8px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #1397bd;
      }
      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.05;
      }
      .copy {
        margin: 12px 0 0;
        color: #4c6c80;
        line-height: 1.6;
      }
      form {
        margin-top: 22px;
        display: grid;
        gap: 14px;
      }
      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
        color: #2c536a;
      }
      input {
        width: 100%;
        border: 1px solid rgba(113, 167, 205, 0.36);
        border-radius: 16px;
        padding: 14px 16px;
        font: inherit;
        color: #173d52;
        background: rgba(246, 251, 255, 0.92);
        outline: none;
      }
      input:focus {
        border-color: #1fa8cc;
        box-shadow: 0 0 0 4px rgba(31, 168, 204, 0.12);
      }
      .password-field {
        position: relative;
      }
      .password-input {
        padding-right: 54px;
      }
      .caps-lock {
        min-height: 18px;
        margin-top: 6px;
        font-size: 12px;
        font-weight: 700;
        color: #c07a14;
        opacity: 0;
        transition: opacity 120ms ease;
      }
      .caps-lock.visible {
        opacity: 1;
      }
      .toggle-password {
        position: absolute;
        top: 50%;
        right: 12px;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        border: none;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: rgba(20, 168, 196, 0.12);
        color: #146f8d;
        box-shadow: none;
        cursor: pointer;
        padding: 0;
      }
      .toggle-password:hover {
        background: rgba(20, 168, 196, 0.18);
      }
      .toggle-password:focus-visible {
        outline: 2px solid rgba(31, 168, 204, 0.4);
        outline-offset: 2px;
      }
      .toggle-password svg {
        width: 18px;
        height: 18px;
      }
      .submit-btn {
        border: none;
        border-radius: 999px;
        padding: 14px 18px;
        font: inherit;
        font-weight: 700;
        color: white;
        background: linear-gradient(90deg, #14a8c4 0%, #2368df 100%);
        cursor: pointer;
        box-shadow: 0 18px 28px rgba(35, 104, 223, 0.24);
      }
      .submit-btn:disabled {
        opacity: 0.7;
        cursor: wait;
      }
      .status {
        min-height: 24px;
        margin-top: 12px;
        font-size: 14px;
        font-weight: 600;
      }
      .status.error {
        color: #c53f5b;
      }
      .status.info {
        color: #146f8d;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">OrderRobot Desktop</p>
      <h1>Sign in to launch the kiosk</h1>
      <p class="copy">
        Enter a valid POS account to start the kiosk, backend services, and hidden bridge browser.
      </p>

      <form id="login-form">
        <label>
          Email or username
          <input id="username" name="username" type="text" autocomplete="username" required />
        </label>
        <label>
          Password
          <div class="password-field">
            <input
              id="password"
              class="password-input"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
            <button
              id="toggle-password"
              class="toggle-password"
              type="button"
              aria-label="Show password"
              title="Show password"
            >
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M2 12C4.4 7.8 8 5.7 12 5.7C16 5.7 19.6 7.8 22 12C19.6 16.2 16 18.3 12 18.3C8 18.3 4.4 16.2 2 12Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <circle cx="12" cy="12" r="3.1" stroke="currentColor" stroke-width="1.8" />
              </svg>
            </button>
          </div>
          <div id="caps-lock-hint" class="caps-lock" aria-live="polite">Caps Lock is on</div>
        </label>
        <button id="submit-btn" class="submit-btn" type="submit">Sign in and open app</button>
      </form>

      <div class="status info" id="status"></div>
    </main>

    <script>
      const form = document.getElementById('login-form');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const togglePasswordBtn = document.getElementById('toggle-password');
      const capsLockHint = document.getElementById('caps-lock-hint');
      const submitBtn = document.getElementById('submit-btn');
      const statusEl = document.getElementById('status');

      function setStatus(message, tone) {
        statusEl.textContent = message || '';
        statusEl.className = `status ${tone || 'info'}`;
      }

      function renderPasswordIcon(isVisible) {
        togglePasswordBtn.innerHTML = isVisible
          ? `
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M3 3L21 21"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M10.7 6C11.1 5.9 11.5 5.9 12 5.9C16 5.9 19.6 8 22 12.2C21.1 13.8 20 15.1 18.8 16.1"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M14.1 14.3C13.6 14.8 12.8 15.1 12 15.1C10.3 15.1 8.9 13.7 8.9 12C8.9 11.2 9.2 10.4 9.7 9.9"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M6 6.9C4.4 8 3.1 9.7 2 12.2C4.4 16.4 8 18.5 12 18.5C13.8 18.5 15.4 18.1 16.9 17.3"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>`
          : `
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M2 12C4.4 7.8 8 5.7 12 5.7C16 5.7 19.6 7.8 22 12C19.6 16.2 16 18.3 12 18.3C8 18.3 4.4 16.2 2 12Z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <circle cx="12" cy="12" r="3.1" stroke="currentColor" stroke-width="1.8" />
            </svg>`;
      }

      function togglePasswordVisibility() {
        const isVisible = passwordInput.type === 'text';
        passwordInput.type = isVisible ? 'password' : 'text';
        togglePasswordBtn.setAttribute('aria-label', isVisible ? 'Show password' : 'Hide password');
        togglePasswordBtn.setAttribute('title', isVisible ? 'Show password' : 'Hide password');
        renderPasswordIcon(!isVisible);
      }

      function updateCapsLockState(event) {
        const isOn = Boolean(event?.getModifierState && event.getModifierState('CapsLock'));
        capsLockHint.classList.toggle('visible', isOn);
      }

      async function loadConfig() {
        try {
          await window.orderRobotDesktop.getLoginConfig();
        } catch (error) {
          setStatus(error?.message || String(error), 'error');
        }
      }

      togglePasswordBtn.addEventListener('click', togglePasswordVisibility);
      passwordInput.addEventListener('keydown', updateCapsLockState);
      passwordInput.addEventListener('keyup', updateCapsLockState);
      passwordInput.addEventListener('focus', updateCapsLockState);
      passwordInput.addEventListener('blur', () => capsLockHint.classList.remove('visible'));

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        submitBtn.disabled = true;
        setStatus('Verifying account...', 'info');
        try {
          await window.orderRobotDesktop.login({
            username: usernameInput.value.trim(),
            password: passwordInput.value,
          });
          setStatus('Starting kiosk...', 'info');
        } catch (error) {
          setStatus(error?.message || String(error), 'error');
          submitBtn.disabled = false;
        }
      });

      renderPasswordIcon(false);
      loadConfig();
    </script>
  </body>
</html>
