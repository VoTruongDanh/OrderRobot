<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrderRobot Login</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Tahoma, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(0, 216, 255, 0.22), transparent 32%),
          radial-gradient(circle at bottom, rgba(255, 0, 153, 0.16), transparent 34%),
          linear-gradient(135deg, #edf7ff 0%, #f7fbff 48%, #eef3ff 100%);
        color: #16364a;
      }
      .shell {
        width: min(540px, calc(100vw - 40px));
        padding: 30px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(98, 184, 222, 0.22);
        box-shadow: 0 28px 70px rgba(31, 77, 110, 0.18);
        backdrop-filter: blur(18px);
      }
      .eyebrow {
        margin: 0 0 8px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #1397bd;
      }
      h1 {
        margin: 0;
        font-size: 34px;
        line-height: 1.05;
      }
      .copy {
        margin: 12px 0 0;
        color: #4c6c80;
        line-height: 1.6;
      }
      form {
        margin-top: 22px;
        display: grid;
        gap: 14px;
      }
      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
        color: #2c536a;
      }
      input {
        width: 100%;
        border: 1px solid rgba(113, 167, 205, 0.36);
        border-radius: 16px;
        padding: 14px 16px;
        font: inherit;
        color: #173d52;
        background: rgba(246, 251, 255, 0.92);
        outline: none;
      }
      input:focus {
        border-color: #1fa8cc;
        box-shadow: 0 0 0 4px rgba(31, 168, 204, 0.12);
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 14px 18px;
        font: inherit;
        font-weight: 700;
        color: white;
        background: linear-gradient(90deg, #14a8c4 0%, #2368df 100%);
        cursor: pointer;
        box-shadow: 0 18px 28px rgba(35, 104, 223, 0.24);
      }
      button:disabled {
        opacity: 0.7;
        cursor: wait;
      }
      .endpoint {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(19, 151, 189, 0.08);
        border: 1px solid rgba(19, 151, 189, 0.18);
        color: #166d8b;
        font-size: 13px;
        word-break: break-all;
      }
      .status {
        min-height: 24px;
        margin-top: 14px;
        font-size: 14px;
        font-weight: 600;
      }
      .status.error {
        color: #c53f5b;
      }
      .status.info {
        color: #146f8d;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <p class="eyebrow">OrderRobot Desktop</p>
      <h1>Dang nhap de mo kiosk</h1>
      <p class="copy">
        Chi khi tai khoan dang nhap POS hop le thi app moi khoi dong toan bo kiosk, backend va bridge
        browser an.
      </p>

      <form id="login-form">
        <label>
          Tai khoan
          <input id="username" name="username" type="text" autocomplete="username" required />
        </label>
        <label>
          Mat khau
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </label>
        <button id="submit-btn" type="submit">Dang nhap va mo app</button>
      </form>

      <div class="endpoint" id="endpoint">Dang tai cau hinh dang nhap...</div>
      <div class="status info" id="status"></div>
    </main>

    <script>
      const form = document.getElementById('login-form');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('submit-btn');
      const endpointEl = document.getElementById('endpoint');
      const statusEl = document.getElementById('status');

      function setStatus(message, tone) {
        statusEl.textContent = message || '';
        statusEl.className = `status ${tone || 'info'}`;
      }

      async function loadConfig() {
        try {
          const config = await window.orderRobotDesktop.getLoginConfig();
          endpointEl.textContent = `API login: ${config?.loginUrl || 'Chua cau hinh'}`;
          if (config?.usernameHint) {
            usernameInput.value = config.usernameHint;
          }
        } catch (error) {
          endpointEl.textContent = 'Khong tai duoc cau hinh login.';
          setStatus(error?.message || String(error), 'error');
        }
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        submitBtn.disabled = true;
        setStatus('Dang xac thuc tai khoan...', 'info');
        try {
          await window.orderRobotDesktop.login({
            username: usernameInput.value.trim(),
            password: passwordInput.value,
          });
          setStatus('Dang khoi dong kiosk...', 'info');
        } catch (error) {
          setStatus(error?.message || String(error), 'error');
          submitBtn.disabled = false;
        }
      });

      loadConfig();
    </script>
  </body>
</html>
